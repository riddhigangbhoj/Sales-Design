      const row = document.querySelector(`#callCockpit .pt-row[data-pt="${i}"]`);
      if (row) { row.classList.remove('now'); row.classList.add('got'); const ck = row.querySelector('.pt-ck'); if (ck) ck.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>'; }
      const next = pts.findIndex((p, idx) => !st.caps['pt-' + key + '-' + idx]);
      if (next !== -1) { const nr = document.querySelector(`#callCockpit .pt-row[data-pt="${next}"]`); if (nr && !nr.classList.contains('got')) nr.classList.add('now'); }
      const cnt = document.getElementById('cpPtCount'); if (cnt) cnt.textContent = `${pts.filter((p, idx) => st.caps['pt-' + key + '-' + idx]).length}/${pts.length}`;
      const now = document.getElementById('cpNow');
      if (now) { now.className = 'prompt-now' + (next === -1 ? ' done' : ''); now.innerHTML = promptNowInner(pts, next); }
      if (next === -1) { clearInterval(cpFlowTimer); cpFlowTimer = null; }
    }
    function startFlow() {
      if (cpFlowTimer) { clearInterval(cpFlowTimer); cpFlowTimer = null; }
      const st = ls(cockpitId); if (!st) return;
      const key = CP_STEPS[st.callStep - 1].key, pts = CP_POINTS[key] || [];
      if (pts.some((p, i) => !st.caps['pt-' + key + '-' + i])) cpFlowTimer = setInterval(flowTick, 3000);
    }

    function renderCockpit() {
      const d = LEADS.find(x => x.booking === cockpitId), st = ls(cockpitId);
      const overlay = document.getElementById('callCockpit');
      if (!d || !overlay) return;
      overlay.className = 'cockpit';
      overlay.innerHTML = cockpitHTML(d, st);
      clearCapTimers();
      if (cpAssessTimer && st.callStep !== 2) { clearTimeout(cpAssessTimer); cpAssessTimer = null; }
      if (st.callStep === 1) scheduleAICapture(d, st);
      else if (st.callStep === 2 && !st.assessReady) scheduleAIAssess(d, st);
      startFlow();
    }

    function cpNotesHTML(st, cfg, d) {
      if (cfg.key === 'details') {
        return CAPTURE_FIELDS.filter(f => st.captureDone[f.key])
          .map(f => `<div class="cp-note-line"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg><span>AI captured <b>${f.label}</b>: ${d.capture[f.key]}</span></div>`).join('');
      }
      return cfg.checks.map((c, i) => ({ c, on: !!st.caps[cfg.key + '-' + i] })).filter(x => x.on)
        .map(x => `<div class="cp-note-line"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg><span>Noted: ${x.c}</span></div>`).join('');
    }
    function refreshCpFeedNotes() {
      const st = ls(cockpitId), cfg = CP_STEPS[st.callStep - 1], d = LEADS.find(x => x.booking === cockpitId);
      const el = document.getElementById('cpNotes'); if (el) el.innerHTML = cpNotesHTML(st, cfg, d);
    }

    const ppStars = (n) => `<span class="pp-stars">${[1, 2, 3, 4, 5].map(k => `<span class="s ${k <= n ? 'on' : ''}">★</span>`).join('')}</span>`;
    const isBLR = (d) => /bengaluru|bangalore/i.test(d.capture.location || '');

    function stepDetails(d, st) {
      const known = knownPairs(d).map(([l, v]) => capRow('k-' + l, l, v, true, '')).join('');
      const caps = CAPTURE_FIELDS.map(f => {
        const ans = d.capture[f.key], answerable = ans && ans !== '—', done = answerable && !!st.captureDone[f.key];
        return capRow(f.key, f.label, done ? ans : '—', done, f.question);
      }).join('');
      return `
        <div class="cp-sec-label">Already on file · AI-confirmed</div><div class="cap-grid">${known}</div>
        <div class="cp-sec-label">To capture on this call · the AI checkmarks these as you ask</div><div class="cap-grid">${caps}</div>`;
    }

    function stepIntent(d, st) {
      const ready = st.assessReady;
      const painHTML = ready
        ? (d.assess.painPoints.length ? d.assess.painPoints.map(p => `<div class="pp-row"><span class="pp-t">${p.t}</span>${ppStars(p.s)}<span class="pp-rate-lbl">AI ${p.s}/5</span></div>`).join('') : `<div class="pp-row"><span class="pp-t" style="color:var(--text-dim)">No clear pain points captured.</span></div>`)
        : `<div class="ai-analysing"><span class="ld"></span>AI is analysing the call for pain points…</div>`;
      const goalsHTML = ready
        ? (d.assess.goals.length ? `<div class="goal-chips">${d.assess.goals.map(g => `<span class="goal-chip">${g}</span>`).join('')}</div>` : `<div class="goal-chips"><span style="color:var(--text-dim);font-size:12.5px">No goals captured.</span></div>`)
        : `<div class="ai-analysing"><span class="ld"></span>Listening for fitness goals…</div>`;
      const intentHTML = ready
        ? `<div class="pp-row"><span class="pp-t">Customer Intent</span>${ppStars(st.intent)}<span class="pp-rate-lbl">AI ${st.intent}/5</span></div>`
        : `<div class="ai-analysing"><span class="ld"></span>Gauging customer intent…</div>`;
      const summaryHTML = ready ? `<div class="captured-text">${d.ai.intentSummary}</div>` : `<div class="ai-analysing"><span class="ld"></span>Summarising customer intent…</div>`;
      return `
        <div class="cp-sec-label">Pain Points · AI-listed &amp; rated /5 <span class="ai-tag">AI</span></div>
        <div class="assess-block">${painHTML}</div>
        <div class="cp-sec-label">Fitness Goals <span class="ai-tag">AI</span></div>
        <div class="assess-block">${goalsHTML}</div>
        <div class="cp-sec-label">Customer Intent <span class="ai-tag">AI</span></div>
        <div class="assess-block">${intentHTML}</div>
        <div class="cp-sec-label">Customer Intent Summary <span class="ai-tag">AI</span></div>
        ${summaryHTML}`;
    }

    function stepSubs(d, st) {
      const mode = st.mode === 'offline' ? 'offline' : 'online';
      const stars = st.intent || d.assess.intentStars || 3;
      const tier = stars >= 4 ? 'High' : stars === 3 ? 'Medium' : 'Low';
      const planCards = PLANS.map(p => {
        const pr = planPrice(p, mode, stars);
        const price = pr.disc > 0 ? `${inr(pr.now)}<span class="o-price">${inr(pr.base)}</span>` : inr(pr.base);
        return `<div class="plan-card ${st.plan === p.key ? 'sel' : ''}" data-cp="plan" data-val="${p.key}"><h4>${p.name}</h4><div class="price">${price}</div></div>`;
      }).join('');
      const addonCards = ADDONS.map(a => `<div class="addon-card ${st.addons.includes(a.key) ? 'sel' : ''}" data-cp="addon" data-val="${a.key}"><div class="a-t">${a.name}</div><div class="a-p">+${inr(a.price)}</div></div>`).join('');
      const tot = bookingTotal(st, mode, stars);
      const totalHTML = st.plan ? `
        <div class="book-total">
          <div class="bt-row"><span>${PLANS.find(p => p.key === st.plan).name} plan</span><span>${inr(tot.plan)}</span></div>
          ${st.addons.map(k => { const a = ADDONS.find(x => x.key === k); return `<div class="bt-row"><span>${a.name}</span><span>+${inr(a.price)}</span></div>`; }).join('')}
          <div class="bt-row total"><span>Booking total</span><span>${inr(tot.total)}</span></div>
        </div>` : `<div class="aempty">Select a plan to see the booking total.</div>`;
      return `
        <div class="cp-sec-label">Subscription Plan · priced for ${tier} intent · selected turns green</div>
        <div class="plan-grid">${planCards}</div>
        <div class="cp-sec-label">Add-ons — total updates as the customer agrees</div>
        <div class="plan-grid">${addonCards}</div>
        <div class="cp-sec-label">Finalised booking price</div>
        ${totalHTML}`;
    }

    function stepBook(d, st) {
      const blr = isBLR(d);
      if (!blr && !st.mode) st.mode = 'online';
      const mode = st.mode || (blr ? null : 'online');
      const modeBlock = blr
        ? `<div class="cp-sec-label">Subscription · Bengaluru → ask online or offline</div>
           <div class="capsules">
             <button type="button" class="capsule ${st.mode === 'online' ? 'active' : ''}" data-cp="mode" data-val="online">Online</button>
             <button type="button" class="capsule ${st.mode === 'offline' ? 'active' : ''}" data-cp="mode" data-val="offline">Offline</button>
           </div>`
        : `<div class="cp-sec-label">Subscription · outside Bengaluru → Online only</div>
           <div class="route-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg><span>Location is <b>${d.capture.location || '—'}</b> — only <b>Online</b> plans are offered here.</span></div>`;
      const trialBlock = `<div class="cp-sec-label">Trial Type · as the customer decides</div>
        ${mode === 'offline'
          ? `<div class="capsules"><button type="button" class="capsule ${st.trial === 'online' ? 'active' : ''}" data-cp="trial" data-val="online">Online Trial</button><button type="button" class="capsule ${st.trial === 'offline' ? 'active' : ''}" data-cp="trial" data-val="offline">Offline Trial</button></div>`
          : `<div class="capsules"><button type="button" class="capsule active" disabled>Online Trial</button></div>`}`;
      const oc = (key, t, dsc, cls) => `<button type="button" class="oc-btn ${cls || ''} ${st.payment === key ? 'active' : ''}" data-cp="pay" data-val="${key}"><span class="oc-t">${t}</span><span class="oc-d">${dsc}</span></button>`;
      const outcomeBlock = `<div class="cp-sec-label">Outcome — what did the customer decide?</div>
        <div class="outcome-grid">
          ${oc('convert', 'Paying Now · Convert', 'Full subscription paid → client created.')}
          ${oc('session', '₹1,000 Single Session', 'Book one paid session with the FSE.')}
          ${oc('assess', 'Free Assessment', 'Book a free assessment → FSE.')}
          ${oc('denies', 'Not Converted', 'Customer declined everything.', 'warn')}
        </div>`;
      const needsSlot = st.payment === 'session' || st.payment === 'assess';
      const physioOpts = [`<option value="" disabled ${st.physio ? '' : 'selected'}>Select physio…</option>`].concat(PHYSIOS.map(p => `<option ${st.physio === p ? 'selected' : ''}>${p}</option>`)).join('');
      const timeOpts = [`<option value="" disabled ${st.slot ? '' : 'selected'}>Select a time slot…</option>`].concat(FSE_TIMES.map(s => `<option ${st.slot === s ? 'selected' : ''}>${s}</option>`)).join('');
      let resultBlock = '';
      if (st.payment === 'convert') resultBlock = `<div class="result ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg><div><b>Client profile created · Converted</b><span>Full payment collected — onboarding begins.</span></div></div>`;
      else if (needsSlot) resultBlock = `
        <div class="cp-sec-label">Ask the date, then read out FSE &amp; physio slots</div>
        <input type="date" class="form-input" data-cp="date" value="${st.date || ''}" style="width:100%;height:38px;margin-bottom:10px" />
        <select class="form-input" data-cp="physio" style="width:100%;height:38px;margin-bottom:10px">${physioOpts}</select>
        <select class="form-input" data-cp="slot" style="width:100%;height:38px">${timeOpts}</select>`;
      else if (st.payment === 'denies') resultBlock = `<div class="result bad"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg><div><b>Not Converted</b><span>Moves to the Not Converted section.</span></div></div>`;
      return `${modeBlock}${trialBlock}${outcomeBlock}${resultBlock}`;
    }

    function stepSummary(d, st) {
      const onbDone = ONBOARDING.filter((s, i) => st.caps['pt-subs-' + i]).length;
      const planName = st.plan ? PLANS.find(p => p.key === st.plan).name : '—';
      const outTxt = { convert: 'Converted (paid)', session: '₹1,000 session booked', assess: 'Free assessment booked', denies: 'Not converted' }[st.payment] || 'Pending';
      const client = [
        `Pain points: ${d.assess.painPoints.map(p => p.t).join(', ') || '—'}`,
        `Goals: ${d.assess.goals.join(', ') || '—'}`,
        `Intent: ${st.intent}/5 — ${d.ai.intentSummary}`,
        `Preference: ${st.mode ? (st.mode === 'online' ? 'Online' : 'Offline') + (st.trial ? ` · ${st.trial} trial` : '') : '—'}`
      ];
      const rep = [
        `Onboarding explained: ${onbDone}/7${onbDone < 7 ? ` · ${7 - onbDone} missed` : ''}`,
        `Pitched: ${planName}${st.addons.length ? ` + ${st.addons.map(k => ADDONS.find(a => a.key === k).name).join(', ')}` : ''}`,
        `Outcome: ${outTxt}`,
        (st.physio && st.slot) ? `Booked: ${st.physio} · ${st.date || ''} ${st.slot}` : ''
      ].filter(Boolean);
      const labelReminder = st.label
        ? `<div class="done-chip">Call Type Label: <b>${st.label}</b> ✓</div>`
        : `<div class="route-note warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Reminder — you haven’t set the <b>Call Type Label</b>. Set it before ending:</span></div>
           <div class="capsules" style="margin-top:8px">${['Label 1', 'Label 2', 'Label 3'].map(l => `<button type="button" class="capsule ${st.label === l ? 'active' : ''}" data-cp="label" data-val="${l}">${l}</button>`).join('')}</div>`;
      return `
        <div class="cp-sec-label">AI Call Summary · Customer</div>
        <div class="captured-text">${client.map(l => `• ${l}`).join('<br>')}</div>
        <div class="cp-sec-label">AI Call Summary · Sales Rep</div>
        <div class="captured-text">${rep.map(l => `• ${l}`).join('<br>')}</div>
        <div class="cp-sec-label">Call Type Label ${st.label ? '· set' : '· not set'}</div>
        ${labelReminder}`;
    }

    function pageSummary(d, st, cfg) {
      if (cfg.key === 'details') { const done = CAPTURE_FIELDS.filter(f => st.captureDone[f.key]).length; return `Profile confirmed — 6 fields on file, ${done}/${CAPTURE_FIELDS.length} new details captured on the call.`; }
      if (cfg.key === 'intent') return st.assessReady ? `${d.assess.painPoints.length} pain point(s) rated · intent ${st.intent}/5. ${d.ai.intentSummary}` : 'Analysing the conversation…';
      if (cfg.key === 'subs') { const onbDone = ONBOARDING.filter((s, i) => st.caps['pt-subs-' + i]).length; return `Onboarding ${onbDone}/7 explained. ${st.plan ? `Pitched ${PLANS.find(p => p.key === st.plan).name}` : 'No plan selected yet'}${st.addons.length ? ` + ${st.addons.length} add-on(s)` : ''}.`; }
      if (cfg.key === 'book') return `${st.mode ? (st.mode === 'online' ? 'Online' : 'Offline') : 'Mode pending'}${st.trial ? ` · ${st.trial} trial` : ''}. Outcome: ${st.payment || 'pending'}.`;
      return '';
    }

    function cockpitStep(d, st, cfg) {
      let body = '';
      if (cfg.key === 'details') body = stepDetails(d, st);
      else if (cfg.key === 'intent') body = stepIntent(d, st);
      else if (cfg.key === 'subs') body = stepSubs(d, st);
      else if (cfg.key === 'book') body = stepBook(d, st);
      else if (cfg.key === 'summary') body = stepSummary(d, st);
      return body;
    }

    function cockpitSide(d, st, cfg) {
      const first = d.name.split(' ')[0];
      const sayLines = cfg.say.map((s, i) => `<div class="cp-say" style="animation-delay:${(i * 0.06).toFixed(2)}s"><span class="say-lead">AI · say this</span>${s.replace('{first}', first)}</div>`).join('');
      let decide = '';
      if (cfg.key === 'details') decide = `AI is building <b>${d.name}</b>’s profile from the conversation…`;
      else if (cfg.key === 'intent') decide = st.assessReady ? `Intent <b>${st.intent}/5</b>. ${d.ai.intentSummary}${d.ai.langGap ? ' ⚠ Possible <b>language gap</b>.' : ''}` : 'AI is analysing pain points, goals & intent…';
      else if (cfg.key === 'subs') { const onbDone = ONBOARDING.filter((s, i) => st.caps['pt-subs-' + i]).length; decide = `Onboarding <b>${onbDone}/7</b> explained.${st.plan ? ` Recommending <b>${PLANS.find(p => p.key === st.plan).name}</b>${st.addons.length ? ` + ${st.addons.length} add-on(s)` : ''}.` : ' Pick the plan that fits.'}`; }
      else if (cfg.key === 'book') decide = st.payment ? `Outcome: <b>${{ convert: 'Converted', session: '₹1,000 session', assess: 'Free assessment', denies: 'Not converted' }[st.payment]}</b>.${(st.payment === 'session' || st.payment === 'assess') ? ' Read out the FSE slot & physio.' : ''}` : `${isBLR(d) ? 'Bengaluru → offer online or offline.' : 'Outside Bengaluru → online only.'} Then set the outcome.`;
      else decide = 'Review the AI call summary, then end the call to save & route the lead.';
      return `
        <aside class="cp-side">
          <div class="cp-side-head">
            <div class="cp-ai-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg></div>
            <div><div class="t">AI Co-Pilot</div><div class="cp-listening"><span class="ld"></span>Listening to the call…</div></div>
          </div>
          <div class="cp-feed">
            ${sayLines}
            <div class="cp-decide">${decide}</div>
            <div id="cpNotes">${cpNotesHTML(st, cfg, d)}</div>
          </div>
        </aside>`;
    }

    // Whether the current step lets you advance.
    function canNext(d, st, step) {
      const cfg = CP_STEPS[step - 1];
      if (cfg.key === 'book') {
        if (!st.payment) return false;
        const mode = st.mode || (isBLR(d) ? null : 'online');
        if (st.payment === 'denies') return true;
        if (st.payment === 'convert') return !!mode;
        return !!mode && (mode === 'online' || st.trial) && !!st.physio && !!st.slot && !!st.date;
      }
      return true;
    }
    function cockpitFinishBtn(d, st) {
      const lbl = st.payment === 'convert' ? 'End Call · Create Client' : st.payment === 'denies' ? 'End Call · Not Converted' : (st.payment === 'session' || st.payment === 'assess') ? 'End Call · Transfer to FSE' : 'End Call & Save';
      return `<button type="button" class="btn-primary" data-cp="finish">${lbl}</button>`;
    }

    // Center — the AI prompter: surfaces the next point to say, + difficult-term guidance.
    // Build the inner of the "say this next" block (also used by the flow timer to update live).
    function promptNowInner(pts, cur) {
      if (cur === -1) return `<span class="pn-lead">All points covered ✓</span><div class="pn-text">Every point on this page is covered.</div>`;
      return `<span class="pn-lead"><span class="pn-live"></span>AI · say this next</span><div class="pn-text">${pts[cur]}</div>${pts[cur + 1] ? `<div class="pn-up">Up next: ${pts[cur + 1]}</div>` : ''}`;
    }
    function promptCenter(d, st, cfg) {
      const pts = CP_POINTS[cfg.key] || [];
      const cur = pts.findIndex((p, i) => !st.caps['pt-' + cfg.key + '-' + i]);
      const hint = st.termHint;
      const hintCard = hint
        ? `<div class="cp-hint" id="cpHint"><span class="hint-lead">💡 Heard “${hint.term}” — say this</span>${hint.text}</div>`
        : `<div class="cp-hint empty" id="cpHint"></div>`;
      return `
        <div class="cp-prompt">
          <div class="cp-prompt-head">
            <div class="cp-ai-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg></div>
            <div><div class="t">AI Co-Pilot</div><div class="cp-listening"><span class="ld"></span>Listening — ticking points off as you say them</div></div>
          </div>
          ${hintCard}
          <div class="prompt-now ${cur === -1 ? 'done' : ''}" id="cpNow">${promptNowInner(pts, cur)}</div>
        </div>`;
    }

    // Right — the points to cover; the AI ticks them as they’re said. Active point flows down.
    function pointsList(d, st, cfg) {
      const pts = CP_POINTS[cfg.key] || [];
      const left = !!st.pageLeft[cfg.key];
      const cur = pts.findIndex((p, i) => !st.caps['pt-' + cfg.key + '-' + i]);
      const covered = pts.filter((p, i) => st.caps['pt-' + cfg.key + '-' + i]).length;
      const rows = pts.map((p, i) => {
        const on = !!st.caps['pt-' + cfg.key + '-' + i], missed = !on && left;
        const cls = on ? 'got' : missed ? 'miss' : i === cur ? 'now' : '';
        const mark = on ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>' : missed ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>' : (i + 1);
        return `<div class="pt-row ${cls}" data-cp="pt" data-val="${i}" data-pt="${i}"><span class="pt-ck">${mark}</span><span class="pt-t">${p}</span></div>`;
      }).join('');
      return `
        <aside class="cp-points">
          <div class="cp-points-head">Points to cover<span class="pt-count" id="cpPtCount">${covered}/${pts.length}</span></div>
          <div class="pt-list">${rows}</div>
        </aside>`;
    }

    // Bottom — a clean note-add block, pinned below and persistent across pages.
    function notesPad(st) {
      return `
        <div class="cp-pad">
          <div class="cp-pad-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Notes<span class="pad-sub">stays with you across pages</span></div>
          <textarea class="cp-pad-ta" data-note="pad" placeholder="Add a note — mention a condition like “arthritis” and the AI will help…">${st.notes.pad || ''}</textarea>
        </div>`;
    }

    function cockpitHTML(d, st) {
      const step = st.callStep, cfg = CP_STEPS[step - 1];
      const pills = CP_STEPS.map((s, i) => { const n = i + 1, cls = n < step ? 'done' : n === step ? 'active' : ''; return `<span class="cp-step-pill ${cls}">${n}. ${s.title}</span>`; }).join('');
      const dots = CP_STEPS.map((s, i) => `<span class="cp-dot ${i + 1 < step ? 'done' : i + 1 === step ? 'active' : ''}"></span>`).join('');
      return `
        <div class="cp-top">
          <span class="cp-rec"><span class="rdot"></span>REC</span>
          <div class="cp-who"><span class="nm">${d.name}</span><span class="ph">${d.phone}</span></div>
          <div class="cp-steps">${pills}</div>
          <div class="cp-spacer"></div>
          <span class="cp-timer" id="cpTimer">0:00</span>
          <button type="button" class="cp-later" data-cp="calllater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 1.5"/></svg>Call Later</button>
          <button type="button" class="cp-end" data-cp="end"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>End Call</button>
        </div>
        <div class="cp-body3">
          <div class="cp-center">
            ${promptCenter(d, st, cfg)}
            <div class="cp-page">${cockpitStep(d, st, cfg)}</div>
          </div>
          ${pointsList(d, st, cfg)}
        </div>
        ${notesPad(st)}
        <div class="cp-foot">
          <div class="cp-dots">${dots}</div>
          <div class="cp-spacer"></div>
          ${step > 1 ? `<button type="button" class="btn-ghost" data-cp="back">Back</button>` : ''}
          ${step < 5 ? `<button type="button" class="btn-primary" data-cp="next" ${canNext(d, st, step) ? '' : 'disabled'}>Next</button>` : cockpitFinishBtn(d, st)}
        </div>`;
    }

    function finishCockpit(d, st) {
      st.decision = 'qualified'; st.subs = d.ai.subs.slice();
      st.stage = 'done';
      if (st.payment === 'convert') { st.outcome = 'converted'; closeCockpit(); rerenderLeads(); return; }
      if (st.payment === 'denies') { st.outcome = 'notconverted'; closeCockpit(); rerenderLeads(); return; }
      // session / assess → transfer to FSE
      st.outcome = 'fse';
      closeCockpit();
      setPage(document.querySelector('.nav a[data-page="FSE"]'));
    }

    function bindCockpit(overlay) {
      overlay.addEventListener('click', (e) => {
        const b = e.target.closest('[data-cp]'); if (!b) return;
        const st = ls(cockpitId), d = LEADS.find(x => x.booking === cockpitId);
        const act = b.dataset.cp, val = b.dataset.val;
        if (act === 'end') { st.stage = 'new'; closeCockpit(); rerenderLeads(); }
        else if (act === 'calllater') { st.stage = 'done'; st.outcome = 'followup'; addReminder(d, 'followup', 'Customer asked to be called later — follow-up scheduled.'); closeCockpit(); rerenderLeads(); }
        else if (act === 'back') { st.callStep = Math.max(1, st.callStep - 1); renderCockpit(); }
        else if (act === 'next') { if (!canNext(d, st, st.callStep)) return; st.pageLeft[CP_STEPS[st.callStep - 1].key] = true; st.callStep = Math.min(5, st.callStep + 1); renderCockpit(); }
        else if (act === 'mode') { st.mode = val; if (val === 'online') st.trial = null; renderCockpit(); }
        else if (act === 'trial') { st.trial = val; renderCockpit(); }
        else if (act === 'plan') { st.plan = val; renderCockpit(); }
        else if (act === 'addon') { const i = st.addons.indexOf(val); if (i >= 0) st.addons.splice(i, 1); else st.addons.push(val); renderCockpit(); }
        else if (act === 'pt') { const k = 'pt-' + CP_STEPS[st.callStep - 1].key + '-' + val; st.caps[k] = !st.caps[k]; renderCockpit(); }
        else if (act === 'label') { st.label = (st.label === val) ? null : val; renderCockpit(); }
        else if (act === 'intent') { st.intent = Number(val); renderCockpit(); }
        else if (act === 'pay') { st.payment = val; renderCockpit(); }
        else if (act === 'finish') { finishCockpit(d, st); }
      });
      overlay.addEventListener('change', (e) => {
        const st = ls(cockpitId);
        if (e.target.dataset.cp === 'physio') { st.physio = e.target.value; renderCockpit(); }
        else if (e.target.dataset.cp === 'slot') { st.slot = e.target.value; renderCockpit(); }
        else if (e.target.dataset.cp === 'date') { st.date = e.target.value; renderCockpit(); }
      });
      overlay.addEventListener('input', (e) => {
        if (e.target.dataset.note === undefined) return;
        const st = ls(cockpitId);
        st.notes[e.target.dataset.note] = e.target.value;
        if (e.target.dataset.note === 'pad') detectTerm(st, e.target.value);
      });
    }

    // Lead lifecycle: start call → manual inputs → AI fill → review → confirm → move / disqualify.
    function handleLeadAction(e) {
      const card = e.target.closest('.lead-card2');
      if (!card) return;
      const el = e.target.closest('[data-act]');
      if (!el || !card.contains(el)) return;
      const d = LEADS.find(x => x.booking === card.dataset.id);
      const st = ls(card.dataset.id);
      const act = el.dataset.act, val = el.dataset.val;
      if (act === 'start-call') { openCockpit(card.dataset.id); return; }
      else if (act === 'label') st.label = (st.label === val) ? null : val;
      else if (act === 'intent') st.intent = Number(val);
      else if (act === 'end-call') { if (!st.label || !st.intent) return; aiFill(d, st); st.stage = 'review'; }
      else if (act === 'decision') {
        if (st.decision === val) { st.decision = null; st.subs = []; }
        else { st.decision = val; st.subs = []; }
      }
      else if (act === 'sub') {
        const i = st.subs.indexOf(val);
        if (i >= 0) st.subs.splice(i, 1); else st.subs.push(val);
      }
      else if (act === 'mode') { st.mode = val; if (val === 'online') st.trial = null; }
      else if (act === 'trial') st.trial = val;
      else if (act === 'add-reminder') { st.reminder = true; addReminder(d, 'manual', 'Manual reminder added by sales after the call.'); }
      else if (act === 'confirm-move') {
        if (!st.mode || !st.physio || !st.slot || (st.mode === 'offline' && !st.trial)) return;
        st.stage = 'done'; st.outcome = 'fse';
        setPage(document.querySelector('.nav a[data-page="FSE"]'));
        return;
      }
      else if (act === 'route-ai-call') { st.stage = 'done'; st.outcome = 'ai-call'; }
      else if (act === 'route-followup') { st.stage = 'done'; st.outcome = 'followup'; addReminder(d, 'followup', followReason(d, st)); }
      else if (act === 'route-trash') { st.stage = 'done'; st.outcome = 'trash'; }
      else if (act === 'route-disqualify') { st.stage = 'done'; st.outcome = 'disqualified'; }
      else return;
      rerenderLeads();
    }

    workspace.addEventListener('click', handleLeadAction);
    workspace.addEventListener('change', (e) => {
      const card = e.target.closest('.lead-card2');
      if (!card) return;
      const st = ls(card.dataset.id);
      if (e.target.dataset.act === 'physio') st.physio = e.target.value;
      else if (e.target.dataset.act === 'slot') st.slot = e.target.value;
      else return;
      rerenderLeads();
    });

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => { e.preventDefault(); setPage(link); });
    });

    setPage(document.querySelector('.nav a.active'));
  </script>
</body>
</html>
