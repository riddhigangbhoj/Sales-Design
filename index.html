      if (route === 'followup') {
        const trash = !d.ai.minInfo ? `<button type="button" class="btn-ghost danger-ghost" data-act="route-trash">Send to Trash</button>` : '';
        return `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary" data-act="route-followup">Schedule Follow-up</button>${rem}${trash}</div></div>`;
      }
      return `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary danger" data-act="route-disqualify">Confirm Disqualification</button>${rem}</div></div>`;
    }

    function leadCard(d) {
      const st = ls(d.booking);
      const head = `
        <div class="lc-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_PERSON}</svg>
          <span class="lc-title">${d.name}</span>
          <span class="alert-label-tag lbl-${d.label}">${ALERT_LABELS[d.label].name}</span>
          ${st.stage === 'new' ? '' : statusPill(st, false)}
        </div>`;
      // Card facts: name (above) · phone · lead date · condition · lead source · campaign name & id · location if provided.
      const info = `
        <div class="pgrid">
          ${dcell('Phone Number', d.phone)}
          ${dcell('Lead Date', fmtAlertDate(d.date))}
          ${dcell('Condition', d.condition || '—')}
          ${dcell('Lead Source', d.source)}
          ${dcell('Campaign ID', d.campaign)}
          ${d.location ? dcell('Location', d.location) : ''}
          ${dcell('Campaign', d.campaignName, true)}
        </div>`;
      // One-line AI call summary (full text on hover). Fresh leads have no call yet → no summary.
      const showAi = d.ai && d.ai.intentSummary && !(d.fresh && st.stage === 'new');
      const aiSummary = showAi ? `
        <div class="lead-ai-line lbl-accent-${d.label}" title="${d.ai.intentSummary.replace(/"/g, '&quot;')}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg>
          <span class="lai-lead">AI</span>
          <span class="lai-txt">${d.ai.intentSummary}</span>
        </div>` : '';

      let body = '', footer = '';
      if (st.stage === 'new') {
        body = '';
        footer = `<div class="lc-foot"><button type="button" class="btn-primary" data-act="start-call">Start Sales Call</button></div>`;
      } else if (st.stage === 'calling') {
        const ready = st.label && st.intent;
        body = `
          <div class="call-banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg>
            On call — AI is listening and capturing the conversation…
          </div>
          ${manualInputs(st, true)}
          <div class="card-hint pad">End the call and the AI fills the lead decision, physio, mode of service, captured intent &amp; trial booking for you to review.</div>`;
        footer = `<div class="lc-foot"><button type="button" class="btn-primary" data-act="end-call" ${ready ? '' : 'disabled'}>End Call — Let AI Fill</button></div>`;
      } else if (st.stage === 'review') {
        const route = recommendRoute(d, st);
        body = `${manualInputs(st, true)}${decisionBlock(d, st)}${routeBlock(d, st, route)}`;
        footer = routeFooter(d, st, route);
      } else { // done
        const modeTxt = st.mode === 'online' ? 'Online' : 'Offline · ' + (st.trial === 'online' ? 'Online Trial' : 'Offline Trial');
        const conv = `Conversion: <b>${d.ai.conversion.level} ${d.ai.conversion.pct}%</b>`;
        const lbl = `Label: <b>${st.label || '—'}</b>`, intn = `Intent: <b>${st.intent}/5</b>`;
        const planName = st.plan ? PLANS.find(p => p.key === st.plan).name : null;
        let chips, tag;
        if (st.outcome === 'converted') {
          chips = [lbl, intn, `Mode: <b>${modeTxt}</b>`, planName ? `Plan: <b>${planName}</b>` : '', conv].filter(Boolean);
          tag = `<span class="moved-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>Client profile created — Converted</span>`;
        } else if (st.outcome === 'notconverted') {
          chips = [lbl, intn, `Outcome: <b>Declined everything</b>`, conv];
          tag = `<span class="moved-tag disq-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg>Not converted</span>`;
        } else if (st.outcome === 'fse') {
          chips = [lbl, intn, `Mode: <b>${modeTxt}</b>`, `Physio: <b>${st.physio}</b>`, `Slot: <b>${st.date || ''} ${st.slot}</b>`, conv];
          tag = `<span class="moved-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>Trial booked &amp; confirmed</span>`;
        } else if (st.outcome === 'ai-call') {
          chips = [lbl, intn, `Flag: <b>Language gap</b>`, conv];
          tag = `<span class="moved-tag aicall-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg>Rescheduled for AI call — see AI Alerts</span>`;
        } else if (st.outcome === 'followup') {
          chips = [lbl, intn, conv];
          tag = `<span class="moved-tag followup-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 1.5"/></svg>Follow-up scheduled — see Alerts</span>`;
        } else if (st.outcome === 'trash') {
          chips = [lbl, intn, `Reason: <b>Min info not gathered</b>`];
          tag = `<span class="moved-tag trash-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Sent to trash</span>`;
        } else { // disqualified
          chips = [lbl, intn, `Reason: <b>${st.subs.join(', ') || '—'}</b>`, conv];
          tag = `<span class="moved-tag disq-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg>Lead disqualified</span>`;
        }
        body = `<div class="done-chips">${chips.map(c => `<span class="done-chip">${c}</span>`).join('')}</div>`;
        footer = st.outcome === 'followup'
          ? `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary" data-act="start-call">Start Follow-up Call</button></div></div>`
          : `<div class="lc-foot">${tag}</div>`;
      }

      return `<div class="lead-card lead-card2" data-id="${d.booking}">${head}${info}${aiSummary}${body}${footer}</div>`;
    }

    function leadsTab() {
      const sales = LEADS.filter(d => d.pool === 'sales');

      const items = applyFilterSort(sales, leadCtl)

      const cards = items.length
        ? items.map(leadCard).join('')

        <div class="lead-tab">

    // Normalised view for an FSE card — works for direct-arrival FSE leads and
    // for Sales leads the rep later moved to FSE after the AI call.
    function fseView(d) {
      const st = ls(d.booking);
      let fseType, bookedTime, physio, address, trialSession, conversionCall;
      if (d.pool === 'fse') {
        fseType = d.fseType; bookedTime = d.bookedTime; physio = d.physio; address = d.address;
        trialSession = d.trialSession; conversionCall = d.conversionCall;
      } else { // moved from Sales
        fseType = st.mode === 'online' ? 'online-trial' : (st.trial === 'offline' ? 'offline-trial' : 'online-trial');
        bookedTime = ((st.date || '') + ' ' + (st.slot || '')).trim() || '—';
        physio = st.physio; address = d.capture.location;
      }
      return { d, st, fseType, bookedTime, physio, address, trialSession, conversionCall,
        name: d.name, phone: d.phone, campaignName: d.campaignName || d.campaign, profile: d.capture, assess: d.assess };
    }

    const FSE_TYPE_LABEL = { 'outside': 'Outside BLR', 'online-trial': 'Online Trial', 'offline-trial': 'Offline Trial' };

      const labelChip = st.fseLabel ? `<span class="fse-label-chip">${st.fseLabel}</span>` : '';
      const doneChip = st.fseCallDone ? `<span class="fse-done-chip">Call done ✓</span>` : '';
      const startTxt = st.fseCallDone ? 'Reopen Call' : (offline ? 'Start Conversion Call' : 'Start FSE Call');
      return `
        <div class="lead-card fse-card ${st.fseCallDone ? 'calldone' : ''}" data-id="${d.booking}">
          <div class="lc-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_PERSON}</svg>
            <span class="lc-title">${v.name}</span>
            ${labelChip}${doneChip}
            <span class="type-capsule">${FSE_TYPE_LABEL[v.fseType]}</span>

    function perfSlice(period, person) {
      const all = PERF_DATA[period];
      const names = person === 'all' ? Object.keys(all) : [person];
      const recs = names.map(n => ({ name: n, ...all[n] }));
      const sum = k => recs.reduce((s, r) => s + r[k], 0);
      const wLeads = sum('leads') || 1, wConv = sum('conversions') || 1;
      const tatHours = recs.reduce((s, r) => s + r.tatHours * r.leads, 0) / wLeads;
      const convertDays = recs.reduce((s, r) => s + r.convertDays * r.conversions, 0) / wConv;
      const tag = (arr, r) => arr.map(x => ({ ...x, owner: r.name }));
      const prospects = recs.flatMap(r => tag(r.prospects, r));
      const losses = recs.flatMap(r => tag(r.losses, r));
      const misses = {
        reminder: recs.flatMap(r => tag(r.misses.reminder, r)),
        fresh: recs.flatMap(r => tag(r.misses.fresh, r)),
        cold: recs.flatMap(r => tag(r.misses.cold, r))
      };
      return {
        multi: names.length > 1,
        leads: sum('leads'), called: sum('called'), trial: sum('trial'),
        conversions: sum('conversions'), captured: sum('captured'),
        tatHours, convertDays, prospects, losses, misses,
        potential: prospects.reduce((s, p) => s + p.amount, 0),

      const prospectsCard = `
        <div class="perf-card">

        return `<div class="miss-group"><div class="miss-gh"><span class="mg-title">${t.title}</span><span class="mg-count">${items.length}</span></div>${rows}</div>`;
      }).join('');
      const missesCard = `
        <div class="perf-card">
          <div class="perf-card-head">Misses<span class="pc-sub">${missCount} flagged</span></div>
          ${missCount ? missGroups : '<div class="perf-list"><div class="aempty">No misses in this period — reminders, SLAs and fresh-lead ages are all on track.</div></div>'}
        </div>`;

      // Losses (tagged by reason)
      const lossRows = s.losses.length ? s.losses.map(l => `
        <div class="loss-row">
          <div class="loss-main">
            <div class="loss-name">${l.lead}${owner(l)}</div>

      const lossesCard = `
        <div class="perf-card">
          <div class="perf-card-head">Losses<span class="pc-sub">${s.losses.length} · ${inrShort(s.missed)} missed</span></div>
          <div class="perf-list">${lossRows}</div>
        </div>`;

      return `<div class="perf-wrap">${filters}${hero}${prospectsCard}${missesCard}${lossesCard}</div>`;
    }

    // Re-render the Leads tab in place, preserving scroll position.

    // ---------------- In-call AI cockpit (full-screen guided flow) ----------------
    let cockpitId = null, cpStart = 0, cpTimer = null;

    // Four sections, no numbering. The AI walks the rep through each section's spoken
    // lines (the teleprompter); `gate` points pause the flow until the rep makes a
    // decision; one `skip` point demonstrates a section going orange when talk jumps around.
    const SEC_ICONS = {
      details: '<circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/>',
      intent:  '<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>',
      subs:    '<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>',
      book:    '<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>'
    };
    const SECTIONS = [
      { key: 'details', title: 'Details', icon: SEC_ICONS.details, points: [
        { say: '“Hi, am I speaking with {first}?”' },
        { say: '“Are you booking for yourself or a family member?”' },
        { say: '“Got it — and how old are they?”' },
        { say: '“Which area are you based in?”' },
        { say: '“Any health conditions or medications I should note for the doctor?”' },
        { say: '“And when’s the best time to reach you?”' }
      ] },
      { key: 'intent', title: 'Intent & Pain', icon: SEC_ICONS.intent, points: [
        { say: '“What are the main pain points you’re facing?”' },
        { say: '“How severe is it, and how long has it been going on?”' },
        { say: '“And what are your main fitness goals?”' },
        { say: '“How soon are you looking to get started?”', skip: true }
      ] },
      { key: 'book', title: 'Book Assessment', icon: SEC_ICONS.book, points: [
        { say: 'Pitch the free assessment — a physio reviews them, no commitment.' },
        { say: 'Confirm online or offline based on their location.' },
        { say: 'Confirm the assessment type as they decide.' },
        { say: 'Confirm the details below to book the assessment.', gate: 'booking' }
      ] }
    ];

    const fmtTime = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;

    // Step 1 — info we already have vs. info to gather on the call.
    const CAPTURE_FIELDS = [
      { key: 'bookingFor', label: 'Booking For', question: '“Are you booking for yourself or a family member?”' },
      { key: 'ageGender', label: 'Age & Gender of Patient', question: '“May I know the patient’s age and gender?”' },
      { key: 'location', label: 'Location', question: '“Which area are you based in?”' },
      { key: 'contactTime', label: 'Best Time to Contact', question: '“When’s a good time to reach you?”' }
    ];
    const knownPairs = (d) => [
      ['Name', d.name], ['Phone Number', d.phone], ['Lead Source', d.source],
      ['Booked Via', d.bookedVia], ['Campaign ID', d.campaign], ['Booking ID', d.booking]
    ];
    function capRow(key, label, value, captured, question) {
      return `
        <div class="cap-row ${captured ? 'got' : 'missing'}" data-capfield="${key}">
          <span class="cap-check ${captured ? 'on' : ''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></span>
          <div class="cap-body">
            <span class="cap-label">${label}</span>
            <span class="cap-val">${value}</span>
            ${captured ? '' : `<span class="cap-q">Ask: ${question}</span>`}
          </div>
          <span class="cap-status">${captured ? 'AI ✓' : 'AI listening…'}</span>
        </div>`;
    }

    let cpCapTimers = [];
    const clearCapTimers = () => { cpCapTimers.forEach(clearTimeout); cpCapTimers = []; };
    function appendCpFeed(html) {
      const el = document.getElementById('cpNotes'); if (!el) return;
      const div = document.createElement('div');
      div.className = 'cp-note-line';
      div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg><span>${html}</span>`;
      el.appendChild(div);
    }
    // The AI "listens" and records the unknown details for the rep, one by one.
    function scheduleAICapture(d, st) {
      const pending = CAPTURE_FIELDS.map(f => ({ ...f, val: d.capture[f.key] }))
        .filter(f => f.val && f.val !== '—' && !st.captureDone[f.key]);
      pending.forEach((f, idx) => {
        const t = setTimeout(() => {
          st.captureDone[f.key] = true;
          const rec = document.getElementById('cpRecorded'); if (rec) rec.innerHTML = recordedInner(d, st);
        }, 1200 * (idx + 1));
        cpCapTimers.push(t);
      });
    }

    // Page 2 — the AI takes a moment to "analyse" the call, then fills pain points/goals/intent.
    let cpAssessTimer = null;
    function scheduleAIAssess(d, st) {
      if (cpAssessTimer) return;
      cpAssessTimer = setTimeout(() => {
        cpAssessTimer = null;
        st.assessReady = true;
        st.intent = d.assess.intentStars;
        const rec = document.getElementById('cpRecorded'); if (rec) rec.innerHTML = recordedInner(d, st);
        const pr = document.getElementById('cpPrompter'); if (pr) pr.innerHTML = prompterInner(d, st);
      }, 1500);
    }

    // Page 3 — subscription plans, add-ons, and intent-based pricing.
    const PLANS = [
      { key: '1m', name: '1 Month',  base: { online: 4999, offline: 9999 },
        includes: ['Personalised plan', 'Dedicated physio', '12 guided sessions', 'App + progress tracking'] },
      { key: '3m', name: '3 Months', base: { online: 12999, offline: 24999 },
        includes: ['Everything in 1 Month', '40 guided sessions', 'Weekly check-ins', 'Nutrition basics'] },
      { key: '6m', name: '6 Months', base: { online: 22999, offline: 44999 },
        includes: ['Everything in 3 Months', '90 guided sessions', 'Quarterly reassessment', 'Priority physio access'] }
    ];
    const ADDONS = [
      { key: 'nutrition', name: 'Nutrition', price: 1999 },
      { key: 'emotional', name: 'Emotional Wellbeing', price: 1499 },
      { key: 'doctor', name: 'Doctor Consultation', price: 999 }
    ];
    const intentDiscount = (stars) => stars >= 4 ? 0 : stars === 3 ? 0.10 : 0.20;
    const inr = (n) => '₹' + n.toLocaleString('en-IN');
    // Compact INR for aggregate figures: 1786000 → ₹17.86L, 310000 → ₹3.1L, 9999 → ₹10K
    const inrShort = (n) => {
      if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2).replace(/\.?0+$/, '') + 'Cr';
      if (n >= 100000)   return '₹' + (n / 100000).toFixed(2).replace(/\.?0+$/, '') + 'L';
      if (n >= 1000)     return '₹' + (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
      return '₹' + n;
    };
    function planPrice(plan, mode, stars) {
      const base = plan.base[mode === 'offline' ? 'offline' : 'online'], disc = intentDiscount(stars);
      const now = disc > 0 ? Math.round(base * (1 - disc) / 100) * 100 : base;
      return { now, base, disc };
    }
    function bookingTotal(st, mode, stars) {
      const plan = st.plan ? planPrice(PLANS.find(p => p.key === st.plan), mode, stars).now : 0;
      const addons = st.addons.reduce((s, k) => s + (ADDONS.find(a => a.key === k) || {}).price, 0);
      return { plan, addons, total: plan + addons };
    }

    // Page 3 — the 7-step onboarding the rep must explain.
    const ONBOARDING = [
      'Welcome & how the programme works',
      'Initial assessment & personalised plan',
      'Your dedicated physio / coach',
      'Session schedule & using the app',
      'Progress tracking & weekly check-ins',
      'Nutrition & wellbeing support',
      'Payment, plan validity & cancellation'
    ];
    // Page 4 — FSE / physio time slots (after a date is chosen).
    const FSE_TIMES = ['9:00 AM', '11:00 AM', '1:00 PM', '3:00 PM', '6:00 PM', '7:30 PM'];

    // (Talking points now live inside SECTIONS above.)

    // If the customer uses a difficult term, the AI tells the rep how to pitch the benefit.
    const TERMS = {
      'arthritis': 'Our physios design joint-friendly, low-impact plans that ease stiffness and rebuild strength safely around arthritis.',
      'sciatica': 'Targeted nerve-glide & core work calms sciatica pain and prevents flare-ups.',
      'diabetes': 'Structured activity plus nutrition coaching that helps manage blood sugar alongside the doctor’s plan.',
      'pcos': 'Hormone-friendly strength & cardio plans with nutrition support tailored for PCOS.',
      'knee': 'Progressive knee-rehab — mobility, strengthening and a safe return to the activities they love.',
      'back pain': 'Posture, core & mobility work that relieves desk-job back pain.',
      'thyroid': 'Energy-aware programming and nutrition guidance that works with thyroid management.',
      'pregnan': 'Safe pre/post-natal programming supervised by trained physios.'
    };
    function detectTerm(st, text) {
      const low = (text || '').toLowerCase();
      let found = null;
      for (const k in TERMS) if (low.includes(k)) found = k;
      if (found && (!st.termHint || st.termHint.term !== found)) {
        st.termHint = { term: found, text: TERMS[found] };
        const el = document.getElementById('cpHint');
        if (el) { el.className = 'cp-hint'; el.innerHTML = `<span class="hint-lead">💡 Heard “${found}” — say this</span>${TERMS[found]}`; }
      }
    }

    function openCockpit(id) {
      const st = ls(id);
      st.stage = 'calling'; st.caps = {}; st.skips = {}; st.notes = {}; st.payment = null; st.captureDone = {};
      st.assessReady = false; st.plan = null; st.addons = []; st.date = '';
      st.mode = null; st.trial = null; st.physio = null; st.slot = null; st.label = null; st.intent = 0;
      st.termHint = null; st._lastActive = null; st._nag = false;
      cockpitId = id; cpStart = Date.now();
      let overlay = document.getElementById('callCockpit');
      if (!overlay) { overlay = document.createElement('div'); overlay.id = 'callCockpit'; document.body.appendChild(overlay); bindCockpit(overlay); }
      renderCockpit();
      clearInterval(cpTimer);
      cpTimer = setInterval(() => { const t = document.getElementById('cpTimer'); if (t) t.textContent = fmtTime(Math.floor((Date.now() - cpStart) / 1000)); }, 1000);
    }

    function closeCockpit() {
      clearInterval(cpTimer); cpTimer = null;
      clearCapTimers();
      if (cpAssessTimer) { clearTimeout(cpAssessTimer); cpAssessTimer = null; }
      if (cpFlowTimer) { clearInterval(cpFlowTimer); cpFlowTimer = null; }
      const o = document.getElementById('callCockpit'); if (o) o.remove();
      cockpitId = null;
    }

    // ---- Flow engine: one continuous timeline across all sections, no Next button ----
    const ptKey = (key, i) => 'pt-' + key + '-' + i;
    const isCovered = (st, key, i) => !!st.caps[ptKey(key, i)];
    const isSkipped = (st, key, i) => !!st.skips[ptKey(key, i)];
    function flatPts() {
      const a = [];
      SECTIONS.forEach(s => s.points.forEach((p, i) => a.push({ key: s.key, i, p })));
      return a;
    }
    // The point the flow is currently "at" — first one neither covered nor skipped.
    function curFlat(st) {
      const a = flatPts();
      return { a, idx: a.findIndex(x => !isCovered(st, x.key, x.i) && !isSkipped(st, x.key, x.i)) };
    }
    function activeKey(st) { const { a, idx } = curFlat(st); return idx === -1 ? null : a[idx].key; }
    function bookingReady(d, st) {
      if (!st.payment) return false;
      const mode = st.mode || (isBLR(d) ? null : 'online');
      if (st.payment === 'denies') return true;
      if (st.payment === 'convert') return !!mode;
      return !!mode && (mode === 'online' || st.trial) && !!st.physio && !!st.slot && !!st.date;
    }
    function gateMet(gate, d, st) { return gate === 'plan' ? !!st.plan : gate === 'booking' ? bookingReady(d, st) : true; }
    function callReady(d, st) { return bookingReady(d, st) && !!st.label; }
    // Section colour: green=all covered · blue=active · orange=flow moved past it incomplete · grey=not reached.
    function secStatus(st, sIdx) {
      const s = SECTIONS[sIdx], total = s.points.length;
      const cov = s.points.filter((p, i) => isCovered(st, s.key, i)).length;
      if (cov === total) return 'done';
      const ak = activeKey(st);
      if (s.key === ak) return 'active';
      const aIdx = ak ? SECTIONS.findIndex(x => x.key === ak) : SECTIONS.length;
      return sIdx < aIdx ? 'skip' : 'todo';
    }

    let cpFlowTimer = null;
    function flowTick() {
      const st = ls(cockpitId), d = LEADS.find(x => x.booking === cockpitId);
      if (!st || !d) return;
      const { a, idx } = curFlat(st);
      if (idx === -1) { clearInterval(cpFlowTimer); cpFlowTimer = null; paintFlow(d, st); return; }
      const cur = a[idx];
      if (cur.p.gate && !gateMet(cur.p.gate, d, st)) { paintFlow(d, st); return; }  // paused: rep must decide
      if (cur.p.skip) st.skips[ptKey(cur.key, cur.i)] = true;                        // AI "didn't hear" it → orange
      else st.caps[ptKey(cur.key, cur.i)] = true;
      const ak = activeKey(st);
      if (ak === 'book' && !isBLR(d) && !st.mode) st.mode = 'online';                // outside BLR → online by default
      if (ak === 'intent' && !st.assessReady && !cpAssessTimer) scheduleAIAssess(d, st);
      paintFlow(d, st);
    }
    function startFlow() {
      if (cpFlowTimer) { clearInterval(cpFlowTimer); cpFlowTimer = null; }
      cpFlowTimer = setInterval(flowTick, 2600);
    }

    // Targeted repaint on each tick — leaves the notes pad (and any open input) untouched.
    function paintFlow(d, st) {
      const pr = document.getElementById('cpPrompter'); if (pr) pr.innerHTML = prompterInner(d, st);
      const rec = document.getElementById('cpRecorded'); if (rec) rec.innerHTML = recordedInner(d, st);
      const rm = document.getElementById('cpRemind'); if (rm) { rm.className = 'cp-remind' + (st._nag && !callReady(d, st) ? ' nag' : ''); rm.innerHTML = remindInner(d, st); }
      SECTIONS.forEach((s, i) => { const el = document.querySelector(`#callCockpit .cp-sec-card[data-key="${s.key}"]`); if (el) el.className = 'cp-sec-card ' + secStatus(st, i); });
      const ak = activeKey(st);
      if (st._lastActive !== ak) { st._lastActive = ak; const da = document.getElementById('cpDecision'); if (da) da.innerHTML = decisionInner(d, st); }
    }

    function renderCockpit() {
      const d = LEADS.find(x => x.booking === cockpitId), st = ls(cockpitId);
      const overlay = document.getElementById('callCockpit');
      if (!d || !overlay) return;
      overlay.className = 'cockpit';
      overlay.innerHTML = cockpitHTML(d, st);
      st._lastActive = activeKey(st);
      clearCapTimers();
      scheduleAICapture(d, st);
      if (activeKey(st) === 'intent' && !st.assessReady && !cpAssessTimer) scheduleAIAssess(d, st);
      startFlow();
    }

    const ppStars = (n) => `<span class="pp-stars">${[1, 2, 3, 4, 5].map(k => `<span class="s ${k <= n ? 'on' : ''}">★</span>`).join('')}</span>`;
    const isBLR = (d) => d.campaignType === 'inside-blr';

    // Center hero — the moving "say this next" teleprompter (current big+blue, then smaller).
    function prompterInner(d, st) {
      const first = d.name.split(' ')[0];
      const { a, idx } = curFlat(st);
      const say = (j) => a[j] ? a[j].p.say.replace('{first}', first) : null;
      if (idx === -1) {
        return `<div class="pn-label">Say this next</div>
          <div class="pn-now done">All points covered ✓</div>
          <div class="pn-sub">Set the outcome &amp; label below, then mark the call ended.</div>`;
      }
      const cur = a[idx];
      const gatePaused = cur.p.gate && !gateMet(cur.p.gate, d, st);
      const cue = gatePaused ? '↓ confirm the outcome &amp; booking below' : '';
      // Only the current line — what comes next depends on the customer, decided live.
      return `<div class="pn-label">Say this next</div>
        <div class="pn-now"><span class="pn-live"></span>${say(idx)}</div>
        ${cue ? `<div class="pn-cue">${cue}</div>` : ''}`;
    }

    // Left — section status cards (green done · blue active · orange skipped · grey to-do).
    function sectionCards(d, st) {
      const cards = SECTIONS.map((s, i) => {
        const status = secStatus(st, i);
        const lbl = status === 'done' ? 'Done' : status === 'active' ? 'Now' : status === 'skip' ? 'Skipped' : '';
        return `<div class="cp-sec-card ${status}" data-key="${s.key}">
          <span class="sc-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${s.icon}</svg></span>
          <span class="sc-t">${s.title}</span>
          <span class="sc-st">${lbl}</span>
        </div>`;
      }).join('');
      return `<aside class="cp-left"><div class="cp-left-head">Points to Cover</div><div class="cp-sec-list">${cards}</div></aside>`;
    }

    // Below the source row — everything the AI has recorded so far, growing through the call.
    function recordedInner(d, st) {
      const cap = d.capture, items = [];
      if (st.captureDone.bookingFor) items.push(`Booking for: <b>${cap.bookingFor}</b>${st.captureDone.ageGender ? ` · ${cap.ageGender}` : ''}`);
      else if (st.captureDone.ageGender) items.push(`Patient: <b>${cap.ageGender}</b>`);
      if (st.captureDone.location) items.push(`Location: <b>${cap.location}</b>`);
      if (st.captureDone.contactTime) items.push(`Best time to contact: <b>${cap.contactTime}</b>`);
      if (st.assessReady) {
        items.push(`Pain points: <b>${d.assess.painPoints.map(p => `${p.t} (${p.s}/5)`).join(', ') || '—'}</b>`);
        if (d.assess.goals.length) items.push(`Goals: <b>${d.assess.goals.join(', ')}</b>`);
        items.push(`Intent: <b>${st.intent}/5</b>`);
      }
      if (st.mode) items.push(`Mode: <b>${st.mode === 'online' ? 'Online' : 'Offline'}${st.trial ? ` · ${st.trial} assessment` : ''}</b>`);
      if (st.physio && st.slot) items.push(`Assessment booked: <b>${st.physio} · ${st.date || ''} ${st.slot}</b>`);
      if (st.payment) items.push(`Outcome: <b>${{ session: '₹1,000 paid assessment booked', assess: 'Free assessment booked', denies: 'Not interested' }[st.payment]}</b>`);
      if (st.label) items.push(`Call label: <b>${st.label}</b>`);
      if (!items.length) return `<div class="rec-empty">Nothing recorded yet — the AI fills this in as the call goes.</div>`;
      return items.map(t => `<div class="rec-line"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg><span>${t}</span></div>`).join('');
    }

    // Decision area inside the hero — plan pricing during Subscriptions, booking inputs during Booking.
    function subsDecision(d, st) {
      const mode = st.mode === 'offline' ? 'offline' : 'online';
      const stars = st.intent || d.assess.intentStars || 3;
      const planCards = PLANS.map(p => {
        const pr = planPrice(p, mode, stars);
        const price = pr.disc > 0 ? `${inr(pr.now)} <span class="o-price">${inr(pr.base)}</span>` : inr(pr.base);
        const feats = p.includes.map(x => `<li>${x}</li>`).join('');
        return `<div class="plan-card ${st.plan === p.key ? 'sel' : ''}" data-cp="plan" data-val="${p.key}"><h4>${p.name}</h4><div class="price">${price}</div><ul class="plan-feats">${feats}</ul></div>`;
      }).join('');
      const addonCards = ADDONS.map(a => `<div class="addon-card ${st.addons.includes(a.key) ? 'sel' : ''}" data-cp="addon" data-val="${a.key}"><div class="a-t">${a.name}</div><div class="a-p">+${inr(a.price)}</div></div>`).join('');
      return `<div class="cp-da-label">Plans — read out what each includes, tap the one they choose</div>
        <div class="plan-grid">${planCards}</div>
        <div class="cp-da-label">Add-ons</div>
        <div class="addon-row">${addonCards}</div>`;
    }

    function bookDecision(d, st) {
      const blr = isBLR(d);
      const mode = st.mode || (blr ? null : 'online');
      const modeBlock = blr
        ? `<div class="cp-da-label">Mode · Bengaluru → ask online or offline</div>
           <div class="capsules"><button type="button" class="capsule ${st.mode === 'online' ? 'active' : ''}" data-cp="mode" data-val="online">Online</button><button type="button" class="capsule ${st.mode === 'offline' ? 'active' : ''}" data-cp="mode" data-val="offline">Offline</button></div>`
        : `<div class="cp-da-label">Mode · ${d.capture.location || 'outside Bengaluru'} → Online only</div>
           <div class="capsules"><button type="button" class="capsule active" disabled>Online</button></div>`;
      const trialBlock = `<div class="cp-da-label">Assessment type</div>${mode === 'offline'
        ? `<div class="capsules"><button type="button" class="capsule ${st.trial === 'online' ? 'active' : ''}" data-cp="trial" data-val="online">Online Assessment</button><button type="button" class="capsule ${st.trial === 'offline' ? 'active' : ''}" data-cp="trial" data-val="offline">In-Person Assessment</button></div>`
        : `<div class="capsules"><button type="button" class="capsule active" disabled>Online Assessment</button></div>`}`;
      const oc = (k, t, dsc, cls) => `<button type="button" class="oc-btn ${cls || ''} ${st.payment === k ? 'active' : ''}" data-cp="pay" data-val="${k}"><span class="oc-t">${t}</span><span class="oc-d">${dsc}</span></button>`;
      const outcomeBlock = `<div class="cp-da-label">Outcome — did they agree to the assessment?</div>
        <div class="outcome-grid">${oc('assess', 'Free Assessment', 'Book the free assessment → FSE.')}${oc('session', '₹1,000 Paid Assessment', 'Book a paid assessment session → FSE.')}${oc('denies', 'Not Interested', 'Declined the assessment.', 'warn')}</div>`;
      let slotBlock = '';
      if (st.payment === 'session' || st.payment === 'assess') {
        const physioOpts = [`<option value="" disabled ${st.physio ? '' : 'selected'}>Select physio…</option>`].concat(PHYSIOS.map(p => `<option ${st.physio === p ? 'selected' : ''}>${p}</option>`)).join('');
        const timeOpts = [`<option value="" disabled ${st.slot ? '' : 'selected'}>Select a time slot…</option>`].concat(FSE_TIMES.map(s => `<option ${st.slot === s ? 'selected' : ''}>${s}</option>`)).join('');
        slotBlock = `<div class="cp-da-label">Date, physio &amp; assessment slot</div>
          <div class="slot-grid"><input type="date" class="form-input" data-cp="date" value="${st.date || ''}"><select class="form-input" data-cp="physio">${physioOpts}</select><select class="form-input" data-cp="slot">${timeOpts}</select></div>`;
      }
      return `${modeBlock}${trialBlock}${outcomeBlock}${slotBlock}`;
    }

    function decisionInner(d, st) {
      const ak = activeKey(st);
      if (ak === 'subs') return subsDecision(d, st);
      if (ak === 'book') return bookDecision(d, st);
      return '';
    }

    // Pinned reminder at the foot of the hero — must-dos before the call is marked ended.
    function remindInner(d, st) {
      const chip = (on, txt) => `<span class="rm-chip ${on ? 'on' : ''}">${on ? '✓' : '•'} ${txt}</span>`;
      const labels = ['Label 1', 'Label 2', 'Label 3'].map(l => `<button type="button" class="capsule sm ${st.label === l ? 'active' : ''}" data-cp="label" data-val="${l}">${l}</button>`).join('');
      const nag = st._nag && !callReady(d, st) ? `<div class="rm-nag">Pick an outcome and a call-type label to mark the call ended.</div>` : '';
      return `<div class="rm-head">📌 Before you mark the call ended</div>
        <div class="rm-chips">${chip(!!st.payment, 'Confirm the outcome')}${chip(!!st.label, 'Set the call-type label')}</div>
        <div class="rm-labels">${labels}</div>${nag}`;
    }

    // Bottom — a clean note-add block, pinned below and persistent through the call.
    function notesPad(st) {
      return `
        <div class="cp-pad">
          <div class="cp-pad-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Notes<span class="pad-sub">stays with the call</span></div>
          <textarea class="cp-pad-ta" data-note="pad" placeholder="Add a note — mention a condition like “arthritis” and the AI will help…">${st.notes.pad || ''}</textarea>
        </div>`;
    }

    function cockpitHTML(d, st) {
      const hint = st.termHint;
      const hintCard = hint
        ? `<div class="cp-hint" id="cpHint"><span class="hint-lead">💡 Heard “${hint.term}” — say this</span>${hint.text}</div>`
        : `<div class="cp-hint empty" id="cpHint"></div>`;
      return `
        <div class="cp-top">
          <div class="cp-who"><span class="nm">${d.name}</span><span class="ph">${d.phone}</span></div>
          <div class="cp-spacer"></div>
          <span class="cp-rectimer"><span class="rdot"></span><span id="cpTimer">0:00</span></span>
          <button type="button" class="cp-ended" data-cp="callended">Call Ended</button>
        </div>
        <div class="cp-body2">
          ${sectionCards(d, st)}
          <div class="cp-center2">
            <div class="cp-hero">
              ${hintCard}
              <div class="cp-prompter" id="cpPrompter">${prompterInner(d, st)}</div>
              <div class="cp-decision" id="cpDecision">${decisionInner(d, st)}</div>
              <div class="cp-remind${st._nag && !callReady(d, st) ? ' nag' : ''}" id="cpRemind">${remindInner(d, st)}</div>
            </div>
            <div class="cp-srcrow">
              <span class="src-cell"><span class="src-l">Lead Source</span><span class="src-v">${d.source}</span></span>
              <span class="src-cell"><span class="src-l">Booked Via</span><span class="src-v">${d.bookedVia}</span></span>
            </div>
            <div class="cp-recorded-wrap">
              <div class="cp-rec-head">Info as Recorded</div>
              <div class="cp-recorded" id="cpRecorded">${recordedInner(d, st)}</div>
            </div>
          </div>
        </div>
        ${notesPad(st)}`;
    }

    function finishCockpit(d, st) {
      st.decision = 'qualified'; st.subs = d.ai.subs.slice();
      st.stage = 'done';
      if (st.payment === 'convert') { st.outcome = 'converted'; closeCockpit(); rerenderLeads(); return; }
      if (st.payment === 'denies') { st.outcome = 'notconverted'; closeCockpit(); rerenderLeads(); return; }
      // session / assess → trial booked
      st.outcome = 'fse';
      closeCockpit();
      rerenderLeads();
    }

    function bindCockpit(overlay) {
      overlay.addEventListener('click', (e) => {
        const b = e.target.closest('[data-cp]'); if (!b) return;
        const st = ls(cockpitId), d = LEADS.find(x => x.booking === cockpitId);
        const act = b.dataset.cp, val = b.dataset.val;
        if (act === 'callended') { if (!callReady(d, st)) { st._nag = true; renderCockpit(); return; } finishCockpit(d, st); }
        else if (act === 'mode') { st.mode = val; if (val === 'online') st.trial = null; renderCockpit(); }
        else if (act === 'trial') { st.trial = val; renderCockpit(); }
        else if (act === 'plan') { st.plan = val; renderCockpit(); }
        else if (act === 'addon') { const i = st.addons.indexOf(val); if (i >= 0) st.addons.splice(i, 1); else st.addons.push(val); renderCockpit(); }
        else if (act === 'label') { st.label = (st.label === val) ? null : val; renderCockpit(); }
        else if (act === 'pay') { st.payment = val; renderCockpit(); }
      });
      overlay.addEventListener('change', (e) => {
        const st = ls(cockpitId);
        if (e.target.dataset.cp === 'physio') { st.physio = e.target.value; renderCockpit(); }
        else if (e.target.dataset.cp === 'slot') { st.slot = e.target.value; renderCockpit(); }
        else if (e.target.dataset.cp === 'date') { st.date = e.target.value; renderCockpit(); }
      });
      overlay.addEventListener('input', (e) => {
        if (e.target.dataset.note === undefined) return;
        const st = ls(cockpitId);
        st.notes[e.target.dataset.note] = e.target.value;
        if (e.target.dataset.note === 'pad') detectTerm(st, e.target.value);
      });
    }

    // ================= FSE call (no AI) — Write PPT briefing · notes · profile label =================
    let fseCallId = null, fseStart = 0, fseTimer = null;
    const fseLeadOf = (id) => LEADS.find(x => x.booking === id);

    function openFseCall(id) {
      fseCallId = id; fseStart = Date.now();
      const st = ls(id); st.fseNotes = st.fseNotes || '';
      let o = document.getElementById('fseCall');
      if (!o) { o = document.createElement('div'); o.id = 'fseCall'; document.body.appendChild(o); bindFseCall(o); }
      renderFseCall();
      clearInterval(fseTimer);
      fseTimer = setInterval(() => { const t = document.getElementById('fseTimer'); if (t) t.textContent = fmtTime(Math.floor((Date.now() - fseStart) / 1000)); }, 1000);
    }
    function closeFseCall() { clearInterval(fseTimer); fseTimer = null; closePpt(); const o = document.getElementById('fseCall'); if (o) o.remove(); fseCallId = null; }
    function endFseCall() { const st = ls(fseCallId); st.fseCallDone = true; closeFseCall(); setLeadsTab('fse'); }

    function renderFseCall() {
      const d = fseLeadOf(fseCallId), o = document.getElementById('fseCall');
      if (!d || !o) return;
      const v = fseView(d), st = v.st, offline = v.fseType === 'offline-trial';
      const pp = v.assess.painPoints.map(p => `${p.t} (${p.s}/5)`).join(', ') || '—';
      const goals = v.assess.goals.join(', ') || '—';
      const labels = ['Label 1', 'Label 2', 'Label 3'].map(l =>
        `<button type="button" class="capsule ${st.fseLabel === l ? 'active' : ''}" data-fse="label" data-val="${l}">${l}</button>`).join('');
      const heading = offline ? 'Offline trial → conversion call' : (v.fseType === 'online-trial' ? 'Online trial call' : 'FSE call');
      o.className = 'cockpit';
      o.innerHTML = `
        <div class="cp-top">
          <div class="cp-who"><span class="nm">${v.name}</span><span class="ph">${v.phone} · ${v.campaignName}</span></div>
          <div class="cp-spacer"></div>
          <span class="cp-rectimer"><span class="rdot"></span><span id="fseTimer">0:00</span></span>
          <button type="button" class="cp-ended" data-fse="end">End Call</button>
        </div>
        <div class="fse-call-body">
          <div class="fse-call-inner">
            <div class="fse-call-h">${heading}</div>
            <div class="fse-call-sub">${FSE_TYPE_LABEL[v.fseType]} · ${offline ? (v.trialSession || v.bookedTime) : v.bookedTime}${v.physio ? ' · ' + v.physio : ''}</div>

            <button type="button" class="fse-ppt-btn" data-fse="ppt">
              <span class="ppt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></span>
              <span class="ppt-txt"><b>Write PPT</b><span>Auto-generated briefing deck from ${v.name.split(' ')[0]}'s info — open to refer during the call</span></span>
              <span class="ppt-go">Open ›</span>
            </button>

            <div class="fse-info-card">
              <div class="fci-head">Client info</div>
              <div class="pgrid">
                ${dcell('Booking For', v.profile.bookingFor)}
                ${dcell('Age & Gender', v.profile.ageGender)}
                ${dcell('Location / Address', v.address || v.profile.location, true)}
                ${dcell('Pain Points', pp, true)}
                ${dcell('Goals', goals, true)}
                ${dcell('Best Time', v.profile.contactTime)}
              </div>
              ${offline ? `<div class="fse-conv-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_CLOCK2}</svg><span>Conversion call ${v.conversionCall || 'at the end of the session'} — offline trial → offline subscription.</span></div>` : ''}
            </div>

            <div class="fse-field">
              <div class="field-label">Mark the client profile</div>
              <div class="capsules">${labels}</div>
            </div>

            <div class="fse-field">
              <div class="field-label">Notes</div>
              <textarea class="fse-notes-ta" data-fse="notes" placeholder="Write notes about the client during the call…">${st.fseNotes || ''}</textarea>
            </div>
          </div>
        </div>`;
    }

    function bindFseCall(o) {
      o.addEventListener('click', (e) => {
        const b = e.target.closest('[data-fse]'); if (!b) return;
        const st = ls(fseCallId), act = b.dataset.fse;
        if (act === 'end') endFseCall();
        else if (act === 'label') { st.fseLabel = (st.fseLabel === b.dataset.val) ? null : b.dataset.val; renderFseCall(); }
        else if (act === 'ppt') openPpt(fseCallId);
      });
      o.addEventListener('input', (e) => { if (e.target.dataset.fse !== 'notes') return; ls(fseCallId).fseNotes = e.target.value; });
    }

    // ---- Write PPT — a customised briefing deck generated from the client's info ----
    let pptIdx = 0;
    function buildSlides(v) {
      const offline = v.fseType === 'offline-trial';
      const pp = v.assess.painPoints.length ? v.assess.painPoints.map(p => `${p.t} — severity ${p.s}/5`) : ['No specific pain points captured yet'];
      const goals = v.assess.goals.length ? v.assess.goals : ['To be discovered on the call'];
      const plan = offline ? 'Offline plan (centre-based)' : 'Online plan';
      const path = offline
        ? 'Run the offline trial, then convert to an <b>offline subscription</b> on the conversion call right after.'
        : 'Run the trial assessment, then convert to an <b>online subscription</b> with a clear next session.';
      const talking = [
        `Open with their main concern: ${v.assess.painPoints[0] ? v.assess.painPoints[0].t : 'their goals'}.`,
        `Tie the plan to their goal: ${goals[0]}.`,
        'Reassure on safety — physio-designed, age-appropriate progression.',
        offline ? 'Close on the offline subscription right after the trial.' : 'Close on the online subscription with a clear next session.'
      ];
      return [
        { t: 'Client Briefing', big: v.name, lines: [`${FSE_TYPE_LABEL[v.fseType]} · ${v.campaignName}`, `${offline ? 'Offline trial' : 'FSE call'}: ${offline ? (v.trialSession || v.bookedTime) : v.bookedTime}`, v.physio ? `Physio: ${v.physio}` : ''] },
        { t: 'Profile', lines: [`Booking for: ${v.profile.bookingFor}`, `Age & gender: ${v.profile.ageGender}`, `Location: ${v.address || v.profile.location}`, `Best time: ${v.profile.contactTime}`] },
        { t: 'Pain Points & Conditions', lines: pp },
        { t: 'Goals', lines: goals },
        { t: 'Recommended Plan & Talking Points', lines: [`Suggested: <b>${plan}</b>`, ...talking] },
        { t: 'Trial → Conversion Path', lines: [path] }
      ];
    }
    function openPpt(id) { pptIdx = 0; let m = document.getElementById('pptModal'); if (!m) { m = document.createElement('div'); m.id = 'pptModal'; document.body.appendChild(m); bindPpt(m); } renderPpt(); }
    function closePpt() { const m = document.getElementById('pptModal'); if (m) m.remove(); }
    function renderPpt() {
      const m = document.getElementById('pptModal'), d = fseLeadOf(fseCallId); if (!m || !d) return;
      const v = fseView(d), slides = buildSlides(v), s = slides[pptIdx];
      const dots = slides.map((_, i) => `<span class="ppt-dot ${i === pptIdx ? 'on' : ''}" data-ppt="go" data-i="${i}"></span>`).join('');
      m.className = 'modal-overlay';
      m.innerHTML = `
        <div class="modal ppt-modal">
          <div class="modal-head">
            <span>Write PPT · ${v.name} <span class="ppt-auto">auto-generated</span></span>
            <button type="button" class="modal-close" data-ppt="close">×</button>
          </div>
          <div class="modal-body ppt-body">
            <div class="ppt-slide">
              <div class="ppt-num">Slide ${pptIdx + 1} / ${slides.length}</div>
              <div class="ppt-title">${s.t}</div>
              ${s.big ? `<div class="ppt-big">${s.big}</div>` : ''}
              <ul class="ppt-lines">${s.lines.filter(Boolean).map(l => `<li>${l}</li>`).join('')}</ul>
            </div>
          </div>
          <div class="modal-foot ppt-foot">
            <div class="ppt-dots">${dots}</div>
            <div class="ppt-nav">
              <button type="button" class="btn-ghost" data-ppt="prev" ${pptIdx === 0 ? 'disabled' : ''}>‹ Prev</button>
              <button type="button" class="btn-primary" data-ppt="next">${pptIdx === slides.length - 1 ? 'Done' : 'Next ›'}</button>
            </div>
          </div>
        </div>`;
    }
    function bindPpt(m) {
      m.addEventListener('click', (e) => {
        if (e.target === m) { closePpt(); return; }
        const b = e.target.closest('[data-ppt]'); if (!b) return;
        const d = fseLeadOf(fseCallId); if (!d) return;
        const slides = buildSlides(fseView(d)), act = b.dataset.ppt;
        if (act === 'close') closePpt();
        else if (act === 'prev') { if (pptIdx > 0) pptIdx--; renderPpt(); }
        else if (act === 'next') { if (pptIdx < slides.length - 1) { pptIdx++; renderPpt(); } else closePpt(); }
        else if (act === 'go') { pptIdx = Number(b.dataset.i); renderPpt(); }
      });
    }

    // Lead lifecycle: start call → manual inputs → AI fill → review → confirm → move / disqualify.
    function handleLeadAction(e) {
      const card = e.target.closest('.lead-card2');
      if (!card) return;
      const el = e.target.closest('[data-act]');
      if (!el || !card.contains(el)) return;
      const d = LEADS.find(x => x.booking === card.dataset.id);
      const st = ls(card.dataset.id);
      const act = el.dataset.act, val = el.dataset.val;
      if (act === 'start-call') { openCockpit(card.dataset.id); return; }
      else if (act === 'label') st.label = (st.label === val) ? null : val;
      else if (act === 'intent') st.intent = Number(val);
      else if (act === 'end-call') { if (!st.label || !st.intent) return; aiFill(d, st); st.stage = 'review'; }
      else if (act === 'decision') {
        if (st.decision === val) { st.decision = null; st.subs = []; }
        else { st.decision = val; st.subs = []; }
      }
      else if (act === 'sub') {
        const i = st.subs.indexOf(val);
        if (i >= 0) st.subs.splice(i, 1); else st.subs.push(val);
      }
      else if (act === 'mode') { st.mode = val; if (val === 'online') st.trial = null; }
      else if (act === 'trial') st.trial = val;
      else if (act === 'add-reminder') { st.reminder = true; addReminder(d, 'manual', 'Manual reminder added by sales after the call.'); }
      else if (act === 'confirm-move') {
        if (!st.mode || !st.physio || !st.slot || (st.mode === 'offline' && !st.trial)) return;
        st.stage = 'done'; st.outcome = 'fse';
      }
      else if (act === 'route-ai-call') { st.stage = 'done'; st.outcome = 'ai-call'; }
      else if (act === 'route-followup') { st.stage = 'done'; st.outcome = 'followup'; addReminder(d, 'followup', followReason(d, st)); }
      else if (act === 'route-trash') { st.stage = 'done'; st.outcome = 'trash'; }
      else if (act === 'route-disqualify') { st.stage = 'done'; st.outcome = 'disqualified'; }
      else return;
      rerenderLeads();
    }

    workspace.addEventListener('click', handleLeadAction);
    workspace.addEventListener('click', (e) => { const b = e.target.closest('[data-fsecall]'); if (b) openFseCall(b.dataset.fsecall); });

    // Shared filter / sort controls for AI Alerts and Leads (data-fctl="scope:action")
    workspace.addEventListener('click', (e) => {
      const f = e.target.closest('[data-fctl]');
      if (!f) return;
      const [scope, action] = f.dataset.fctl.split(':');
      if (action === 'date') return;          // date is handled on change
      applyCtl(scope, action, f.dataset.val);
    });
    workspace.addEventListener('change', (e) => {
      const f = e.target.closest('[data-fctl]');
      if (f) { const [scope, action] = f.dataset.fctl.split(':'); if (action === 'date') { applyCtl(scope, action, e.target.value); return; } }
      const card = e.target.closest('.lead-card2');
      if (!card) return;
      const st = ls(card.dataset.id);
      if (e.target.dataset.act === 'physio') st.physio = e.target.value;
      else if (e.target.dataset.act === 'slot') st.slot = e.target.value;
      else return;
      rerenderLeads();
    });

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => { e.preventDefault(); setPage(link); });
    });

    setPage(document.querySelector('.nav a.active'));
  </script>
</body>
</html>
