<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinetic Age — Leads</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --border: #e8eaee;
      --border-soft: #eef0f3;
      --text: #1f2430;
      --text-muted: #8a90a0;
      --text-dim: #aab0bd;
      --blue: #2f6bf6;
      --blue-soft: #eaf1fe;
      --blue-soft-text: #2f6bf6;
      --blue-divider: #cfdef9;
      --radius: 12px;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---------------- Sidebar ---------------- */
    .sidebar {
      width: 232px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 20px 16px;
    }
    .brand .logo {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2f6bf6, #6f9bff);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 14px;
    }
    .brand .brand-text { line-height: 1.15; }
    .brand .brand-name { font-weight: 700; font-size: 15px; }
    .brand .brand-sub { font-size: 11px; color: var(--text-muted); }

    .nav-label {
      padding: 14px 20px 6px;
      font-size: 11px;
      text-transform: none;
      color: var(--text-dim);
      font-weight: 500;
    }

    .nav { padding: 0 12px 16px; display: flex; flex-direction: column; gap: 1px; }
    .nav a {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 8px 12px;
      border-radius: 8px;
      color: #5b6172;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
    }
    .nav a:hover { background: #f4f6f9; color: var(--text); }
    .nav a.active { background: var(--blue-soft); color: var(--blue-soft-text); }
    .nav a svg { width: 17px; height: 17px; flex-shrink: 0; stroke-width: 1.8; }

    /* ---------------- Content ---------------- */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: 60px;
      flex-shrink: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 22px;
    }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      color: #6b7180; cursor: pointer;
    }
    .icon-btn svg { width: 17px; height: 17px; }

    .topbar .search {
      flex: 1;
      max-width: 460px;
      position: relative;
    }
    .topbar .search svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-dim);
    }
    .topbar .search input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fafbfc;
      padding: 0 12px 0 36px;
      font-size: 13.5px;
      color: var(--text);
      outline: none;
    }
    .topbar .search input::placeholder { color: var(--text-dim); }

    .topbar .spacer { flex: 1; }

    .user {
      display: flex; align-items: center; gap: 10px;
    }
    .user .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--blue-soft); color: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px;
    }
    .user .u-name { font-weight: 600; font-size: 13px; line-height: 1.2; }
    .user .u-role { font-size: 11px; color: var(--text-muted); }

    /* ---------------- Body: leads + workspace ---------------- */
    .body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* Leads panel */
    .leads-panel {
      width: 320px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .leads-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border-soft);
    }
    .leads-head .title-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .leads-head h2 { font-size: 16px; font-weight: 700; }
    .leads-head .count-pill {
      font-size: 11px; font-weight: 600;
      color: var(--blue); background: var(--blue-soft);
      padding: 3px 8px; border-radius: 20px;
    }
    .leads-head p { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }
    .leads-search {
      margin-top: 12px; position: relative;
    }
    .leads-search svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; color: var(--text-dim);
    }
    .leads-search input {
      width: 100%; height: 36px;
      border: 1px solid var(--border); border-radius: 9px;
      background: #fafbfc; padding: 0 12px 0 34px;
      font-size: 13px; outline: none; color: var(--text);
    }
    .leads-search input::placeholder { color: var(--text-dim); }

    .leads-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    /* empty states */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-muted);
      padding: 40px 28px;
      gap: 12px;
    }
    .empty .empty-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: #f1f3f7;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
    }
    .empty .empty-icon svg { width: 26px; height: 26px; }
    .empty h3 { font-size: 15px; font-weight: 600; color: #555c6b; }
    .empty p { font-size: 13px; max-width: 280px; line-height: 1.5; }

    .leads-list .empty { padding: 28px 18px; }
    .leads-list .empty h3 { font-size: 14px; }
    .leads-list .empty p { font-size: 12.5px; }

    /* Main workspace */
    .workspace {
      flex: 1;
      display: flex;
      min-width: 0;
      background: var(--bg);
    }

    /* Workspace page with toggle */
    .ws-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .ws-toolbar {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-soft);
      background: var(--panel);
    }
    .seg {
      display: inline-flex;
      background: #f1f3f7;
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }
    .seg-btn {
      border: none;
      background: transparent;
      padding: 8px 22px;
      border-radius: 7px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .seg-btn:hover { color: var(--text); }
    .seg-btn.active {
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow);
    }
    .ws-content {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* Lead profile cards */
    .lead-grid {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 360px));
      gap: 16px;
      align-content: start;
    }
    .lead-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .lc-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border-soft);
    }
    .lc-head svg { width: 16px; height: 16px; color: var(--blue); stroke-width: 1.8; }
    .lc-title { font-size: 13px; font-weight: 700; color: var(--text); }

    /* Parameter grid — 2 columns, dividers drawn by 1px gaps */
    .pgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-soft);
    }
    .pcell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: var(--text);
      background: var(--panel);
      min-width: 0;
    }
    .pcell.full { grid-column: 1 / -1; }

    /* Blue section: same grid, but a blue-tinted divider so the lines are visible */
    .pgrid-ai {
      background: var(--blue-divider);
      border-top: 1px solid var(--border-soft);
    }
    .pcell svg { width: 14px; height: 14px; flex-shrink: 0; stroke-width: 1.8; }

    /* AI-assisted info (blue) */
    .pcell.ai {
      color: var(--blue);
      background: var(--blue-soft);
      font-weight: 500;
    }
    .pcell.section-head {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .pcell.section-head svg { width: 13px; height: 13px; stroke-width: 1.9; }

    /* Leads tab + AI legend */
    .lead-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .ai-legend {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      font-size: 12.5px;
      color: var(--text-muted);
      background: var(--panel);
      border-bottom: 1px solid var(--border-soft);
    }
    .ai-legend .swatch {
      width: 13px; height: 13px;
      border-radius: 4px;
      background: var(--blue);
      flex-shrink: 0;
    }
    .ai-legend b { color: var(--blue); font-weight: 600; }

    /* Leads tab — stacked sections + two-column card grid */
    .leads-scroll { flex: 1; overflow-y: auto; padding: 16px; }
    .leads-section { margin-bottom: 24px; }
    .leads-section:last-child { margin-bottom: 0; }
    .leads-section-head {
      display: flex; align-items: center; gap: 9px;
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 12px;
    }
    .leads-section-head .sec-count {
      font-size: 11px; font-weight: 600;
      color: var(--blue); background: var(--blue-soft);
      padding: 3px 8px; border-radius: 20px;
    }
    .cards-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .followup-badge {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 5px;
      background: #e6f6ec; color: #1f8a4c;
      font-weight: 600; font-size: 11px;
      padding: 3px 10px; border-radius: 20px;
    }
    .followup-badge svg { width: 11px; height: 11px; stroke-width: 2.4; }

    /* Follow-up block on a follow-up card (reason + assignee) */
    .fu-block { padding: 12px 14px; background: #fffaf0; border-top: 1px solid #f0e2c4; }
    .fu-reason { display: flex; gap: 8px; align-items: flex-start; font-size: 12.5px; color: #8a5a16; line-height: 1.5; }
    .fu-reason .ai-tag { flex-shrink: 0; margin-top: 1px; }
    .fu-assignee { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); margin-top: 9px; }
    .fu-assignee svg { width: 14px; height: 14px; stroke-width: 1.8; flex-shrink: 0; }
    .fu-assignee b { color: var(--text); font-weight: 700; }

    /* Lead info cells (label + value) */
    .pcell .pc-label { color: var(--text-muted); }
    .pcell .pc-val { margin-left: auto; font-weight: 600; color: var(--text); text-align: right; }

    /* Star toggle */
    .star-btn {
      margin-left: 10px;
      border: none; background: transparent; cursor: pointer;
      color: var(--text-dim); padding: 2px; line-height: 0;
    }
    .star-btn.solo { margin-left: auto; }
    .star-btn svg { width: 20px; height: 20px; }
    .star-btn:hover { color: #f5a623; }
    .star-btn.on { color: #f5a623; }
    .star-btn.on svg { fill: #f5a623; }

    /* Card blocks — call-type label & AI decision */
    .card-block { padding: 13px 14px; border-top: 1px solid var(--border-soft); }
    .card-block-head {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .card-block-head .ai-tag {
      text-transform: none; letter-spacing: 0;
      font-size: 10px; font-weight: 600;
      color: var(--blue); background: var(--blue-soft);
      padding: 2px 8px; border-radius: 20px;
    }
    .card-hint { margin-top: 9px; font-size: 11px; color: var(--text-dim); line-height: 1.5; }

    .decision-row { display: flex; gap: 10px; }
    .dec-btn {
      flex: 1; cursor: pointer;
      border: 1px solid var(--border); background: #fff;
      font-weight: 600; font-size: 12.5px;
      padding: 10px 12px; border-radius: 9px;
      color: var(--text-muted);
    }
    .dec-btn.qualify:hover { border-color: #1f8a4c; color: #1f8a4c; }
    .dec-btn.disqualify:hover { border-color: #c0392b; color: #c0392b; }
    .dec-btn.qualify.active { background: #e6f6ec; border-color: #1f8a4c; color: #1f8a4c; }
    .dec-btn.disqualify.active { background: #fdeaea; border-color: #c0392b; color: #c0392b; }

    .subs-wrap { margin-top: 12px; }
    .subs-head { font-size: 11.5px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }

    .moved-tag {
      display: inline-flex; align-items: center; gap: 7px; width: 100%; justify-content: center;
      color: #1f8a4c; font-weight: 600; font-size: 12.5px;
    }
    .moved-tag svg { width: 14px; height: 14px; }

    /* Lead lifecycle status pill */
    .status-pill {
      margin-left: 8px;
      display: inline-flex; align-items: center; gap: 6px;
      font-weight: 600; font-size: 11px;
      padding: 3px 10px; border-radius: 20px; white-space: nowrap;
    }
    .status-pill.ml-auto { margin-left: auto; }
    .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .status-pill.new     { background: #eef0f3; color: #6b7180; }
    .status-pill.calling { background: #fdeaea; color: #c0392b; }
    .status-pill.review  { background: #fdf2e0; color: #b25e09; }
    .status-pill.moved   { background: #e6f6ec; color: #1f8a4c; }
    .status-pill.disq    { background: #fdeaea; color: #c0392b; }
    .status-pill.calling .dot { animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

    /* On-call AI banner */
    .call-banner {
      display: flex; align-items: center; gap: 9px;
      margin: 13px 14px 0;
      padding: 10px 12px;
      background: var(--blue-soft); color: var(--blue);
      border-radius: 9px; font-size: 12px; font-weight: 500; line-height: 1.4;
    }
    .call-banner svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* Field labels + intent stars */
    .field-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 7px; display: flex; align-items: center; gap: 7px; }
    .field-label.mt14 { margin-top: 14px; }
    .intent-row { display: flex; align-items: center; }
    .intent-stars { display: inline-flex; gap: 2px; }
    .istar { border: none; background: transparent; cursor: pointer; font-size: 22px; line-height: 1; color: #d7dbe2; padding: 0 1px; }
    .istar.on { color: #f5a623; }
    .istar:disabled, .capsule:disabled { opacity: .55; cursor: default; }
    .intent-label { margin-left: 10px; font-size: 12px; color: var(--text-muted); }

    /* AI review block + captured fields */
    .card-block.ai-block { background: #f7faff; }
    .card-block.req-block { background: #fffdf6; }
    .card-hint.pad { padding: 12px 14px 0; margin-top: 0; }
    .rfield { margin-top: 14px; }
    .ai-pill {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      color: var(--blue); background: var(--blue-soft); padding: 2px 6px; border-radius: 20px;
    }
    .captured-text {
      font-size: 12.5px; line-height: 1.5; color: var(--text);
      background: #fff; border: 1px solid var(--border-soft);
      border-radius: 9px; padding: 10px 12px;
    }
    .card-block select.form-input { width: 100%; height: 38px; }
    .mt10 { margin-top: 10px; }

    /* Done summary chips */
    .done-chips { display: flex; flex-wrap: wrap; gap: 7px; padding: 13px 14px 4px; }
    .done-chip {
      font-size: 11.5px; font-weight: 600;
      background: var(--bg); border: 1px solid var(--border-soft);
      color: var(--text-muted); padding: 5px 10px; border-radius: 20px;
    }
    .done-chip b { color: var(--text); font-weight: 700; }

    .btn-primary.danger { background: #c0392b; }
    .moved-tag.disq-tag { color: #c0392b; }

    /* Conversion chances */
    .conv-block { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .conv-label { font-size: 12px; font-weight: 600; color: var(--text); }
    .conv-badge { margin-left: auto; font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .cv-high { background: #e6f6ec; color: #1f8a4c; }
    .cv-med  { background: #fdf2e0; color: #b25e09; }
    .cv-low  { background: #fdeaea; color: #c0392b; }

    /* Route notes + multi-button footer */
    .route-note { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; line-height: 1.5; padding: 10px 12px; border-radius: 9px; }
    .route-note.purple { background: #efe9fc; color: #5b3a9e; }
    .route-note.warn { background: #fdf2e0; color: #8a5a16; }
    .route-note svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
    .route-note b { font-weight: 700; }
    .lc-foot .foot-row { display: flex; gap: 10px; }
    .lc-foot .foot-row .btn-primary, .lc-foot .foot-row .btn-ghost { flex: 1; width: auto; }
    .btn-primary.aicall-btn { background: #6b3fc4; }
    .btn-ghost.danger-ghost { color: #c0392b; border-color: #f0c4be; }
    .btn-ghost.danger-ghost:hover { background: #fdeaea; }

    /* Extra status pill + done-tag states */
    .status-pill.aicall   { background: #efe9fc; color: #6b3fc4; }
    .status-pill.followup { background: #fdf2e0; color: #b25e09; }
    .status-pill.trash    { background: #eef0f3; color: #8a90a0; }
    .moved-tag.aicall-tag { color: #6b3fc4; }
    .moved-tag.followup-tag { color: #b25e09; }
    .moved-tag.trash-tag { color: #8a90a0; }

    /* Alerts list items */
    .alist { display: flex; flex-direction: column; gap: 10px; }
    .aitem { display: flex; align-items: flex-start; gap: 11px; padding: 12px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
    .aitem .ai-ic { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--blue-soft); color: var(--blue); }
    .aitem .ai-ic svg { width: 16px; height: 16px; }
    .aitem.warn .ai-ic { background: #fdf2e0; color: #b25e09; }
    .aitem.purple .ai-ic { background: #efe9fc; color: #6b3fc4; }
    .aitem .ai-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .aitem .ai-t { font-size: 13px; font-weight: 700; color: var(--text); }
    .aitem .ai-d { font-size: 12px; color: var(--text-muted); line-height: 1.45; }
    .aitem .ai-when { font-size: 11px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
    .aempty { font-size: 12.5px; color: var(--text-dim); padding: 6px 2px; }

    /* ---------------- In-call AI cockpit (full-screen) ---------------- */
    .cockpit { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; }
    .cp-top { display: flex; align-items: center; gap: 16px; padding: 13px 22px; background: var(--panel); border-bottom: 1px solid var(--border); }
    .cp-rec { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; font-size: 12px; color: #c0392b; background: #fdeaea; padding: 5px 11px; border-radius: 20px; }
    .cp-rec .rdot { width: 8px; height: 8px; border-radius: 50%; background: #c0392b; animation: pulse 1.1s ease-in-out infinite; }
    .cp-who { display: flex; flex-direction: column; }
    .cp-who .nm { font-weight: 700; font-size: 14px; }
    .cp-who .ph { font-size: 12px; color: var(--text-muted); }
    .cp-steps { display: flex; gap: 7px; margin-left: 6px; flex-wrap: wrap; }
    .cp-step-pill { font-size: 11.5px; font-weight: 600; color: var(--text-dim); padding: 5px 10px; border-radius: 20px; background: #f1f3f7; white-space: nowrap; }
    .cp-step-pill.active { background: var(--blue-soft); color: var(--blue); }
    .cp-step-pill.done { color: #1f8a4c; background: #e6f6ec; }
    .cp-spacer { flex: 1; }
    .cp-timer { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 14px; color: var(--text); }
    .cp-end { border: 1px solid var(--border); background: #fff; color: #c0392b; font-weight: 600; font-size: 13px; padding: 8px 14px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
    .cp-end:hover { background: #fdeaea; }
    .cp-end svg { width: 14px; height: 14px; }

    .cp-body { flex: 1; display: grid; grid-template-columns: 1fr 360px; min-height: 0; }
    .cp-main { overflow-y: auto; padding: 26px 30px; }
    .cp-main-inner { max-width: 680px; margin: 0 auto; }
    .cp-h { font-size: 20px; font-weight: 800; }
    .cp-sub { font-size: 13.5px; color: var(--text-muted); margin-top: 4px; margin-bottom: 18px; }
    .cp-sec-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); margin: 12px 0 7px; }

    .chk { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel); cursor: pointer; margin-bottom: 9px; }
    .chk input { display: none; }
    .chk-box { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
    .chk-box svg { width: 13px; height: 13px; opacity: 0; }
    .chk.on { border-color: #1f8a4c; background: #f3fbf6; }
    .chk.on .chk-box { background: #1f8a4c; border-color: #1f8a4c; }
    .chk.on .chk-box svg { opacity: 1; }
    .chk-lbl { font-size: 13.5px; font-weight: 500; }
    .chk.on .chk-lbl { color: #1f7a45; }
    .cp-notes { width: 100%; min-height: 84px; border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; font-size: 13px; font-family: inherit; resize: vertical; background: #fafbfc; outline: none; }
    .cp-notes:focus { border-color: var(--blue); background: #fff; }

    /* Capture-details rows — known vs. to-ask; AI checkmarks the unknowns */
    .cap-row { display: flex; align-items: flex-start; gap: 9px; padding: 8px 11px; border: 1px solid var(--border); border-radius: 10px; transition: background .25s, border-color .25s; }
    .cap-row.got { border-color: #cfe9d6; background: #f3fbf6; }
    .cap-row.missing { border-color: #f0d9a8; background: #fffaf0; }
    .cap-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; margin-top: 1px; }
    .cap-check svg { width: 13px; height: 13px; opacity: 0; }
    .cap-check.on { background: #1f8a4c; border-color: #1f8a4c; }
    .cap-check.on svg { opacity: 1; }
    .cap-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .cap-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .cap-val { font-size: 13px; color: var(--text); }
    .cap-row.missing .cap-val { display: none; }
    .cap-q { font-size: 12.5px; color: #9a6a16; }
    .cap-status { margin-left: auto; font-size: 10.5px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .cap-row.got .cap-status { color: #1f8a4c; }
    .cap-row.missing .cap-status { color: #b25e09; }

    .plan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .plan-card { border: 1px solid var(--border); border-radius: 12px; padding: 11px 12px; background: var(--panel); cursor: pointer; }
    .plan-card.sel { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-soft); }
    .plan-card h4 { font-size: 14px; font-weight: 700; }
    .plan-card p { font-size: 12.5px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
    .plan-card .price { margin-top: 9px; font-size: 16px; font-weight: 800; color: var(--blue); }
    .plan-card .o-price { font-size: 12px; color: var(--text-dim); text-decoration: line-through; margin-left: 6px; font-weight: 600; }
    .addon-card { border: 1px solid var(--border); border-radius: 11px; padding: 9px 11px; cursor: pointer; }
    .addon-card.sel { border-color: var(--blue); background: var(--blue-soft); }
    .addon-card .a-t { font-weight: 700; font-size: 13px; }
    .addon-card .a-p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* Page 2 — AI assessment (pain points + ratings, goals, intent) */
    .assess-block { border: 1px solid var(--border); border-radius: 10px; background: var(--panel); padding: 6px 14px; margin-bottom: 4px; }
    .pp-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-top: 1px solid var(--border-soft); }
    .pp-row:first-child { border-top: none; }
    .pp-t { font-size: 13px; font-weight: 600; }
    .pp-stars { margin-left: auto; display: inline-flex; gap: 1px; }
    .pp-stars .s { font-size: 15px; color: #d7dbe2; }
    .pp-stars .s.on { color: #f5a623; }
    .pp-rate-lbl { font-size: 10.5px; color: var(--text-muted); margin-left: 8px; }
    .goal-chips { display: flex; flex-wrap: wrap; gap: 7px; padding: 6px 0; }
    .goal-chip { background: var(--blue-soft); color: var(--blue); font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px; }
    .ai-analysing { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--blue); padding: 11px 0; }
    .ai-analysing .ld { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); animation: pulse 1s ease-in-out infinite; }

    /* Page 3 — pitch ladder */
    .ladder { background: #f7faff; border: 1px dashed #cfdef9; border-radius: 10px; padding: 10px 14px; }
    .ladder-step { display: flex; gap: 9px; align-items: flex-start; font-size: 12.5px; color: #3a5ba0; padding: 5px 0; line-height: 1.45; }
    .ladder-step .n { width: 18px; height: 18px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

    /* Selected plan turns green */
    .plan-card.sel { border-color: #1f8a4c; box-shadow: 0 0 0 2px #e6f6ec; }
    .plan-card.sel h4 { color: #1f7a45; }

    /* 7-step onboarding (green when said, red if skipped) */
    .onb-list { display: flex; flex-direction: column; gap: 8px; }
    .onb-row { display: flex; align-items: center; gap: 11px; padding: 10px 13px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel); cursor: pointer; }
    .onb-row.got { border-color: #cfe9d6; background: #f3fbf6; }
    .onb-row.miss { border-color: #f3c7c0; background: #fdf1ef; }
    .onb-ck { width: 22px; height: 22px; border-radius: 50%; background: #eef0f3; color: var(--text-muted); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .onb-ck svg { width: 13px; height: 13px; }
    .onb-row.got .onb-ck { background: #1f8a4c; color: #fff; }
    .onb-row.miss .onb-ck { background: #c0392b; color: #fff; }
    .onb-t { font-size: 13px; font-weight: 500; flex: 1; }
    .onb-st { font-size: 10.5px; font-weight: 700; color: var(--text-dim); white-space: nowrap; }
    .onb-row.got .onb-st { color: #1f8a4c; }
    .onb-row.miss .onb-st { color: #c0392b; }

    /* Booking total */
    .book-total { border: 1px solid var(--border); border-radius: 10px; background: var(--panel); padding: 6px 14px; }
    .bt-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-top: 1px solid var(--border-soft); color: var(--text-muted); }
    .bt-row:first-child { border-top: none; }
    .bt-row.total { font-weight: 800; color: var(--text); border-top: 2px solid var(--border); font-size: 15px; }

    /* Page 4 — result banners */
    .result { display: flex; align-items: flex-start; gap: 11px; padding: 13px 14px; border-radius: 10px; margin-top: 14px; }
    .result svg { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; }
    .result div { display: flex; flex-direction: column; gap: 2px; }
    .result b { font-size: 13.5px; }
    .result span { font-size: 12px; }
    .result.ok { background: #e6f6ec; color: #1f7a45; }
    .result.bad { background: #fdeaea; color: #c0392b; }

    /* Per-page AI summary */
    .page-sum { display: flex; gap: 9px; align-items: flex-start; background: var(--blue-soft); color: #3a5ba0; border-radius: 10px; padding: 11px 13px; font-size: 12.5px; line-height: 1.5; }
    .page-sum svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; color: var(--blue); }

    /* Call-later button in cockpit top bar */
    .cp-later { border: 1px solid var(--border); background: #fff; color: #b25e09; font-weight: 600; font-size: 13px; padding: 8px 14px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
    .cp-later:hover { background: #fdf2e0; }
    .cp-later svg { width: 14px; height: 14px; }
    .outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .oc-btn { border: 1px solid var(--border); background: #fff; border-radius: 11px; padding: 14px; cursor: pointer; text-align: left; }
    .oc-btn:hover { border-color: var(--blue); }
    .oc-btn.active { border-color: var(--blue); background: var(--blue-soft); }
    .oc-btn .oc-t { display: block; font-size: 13.5px; font-weight: 700; color: var(--text); }
    .oc-btn .oc-d { display: block; font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .oc-btn.warn.active { border-color: #b25e09; background: #fdf2e0; }

    .cp-side { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
    .cp-side-head { display: flex; align-items: center; gap: 9px; padding: 16px 18px; border-bottom: 1px solid var(--border-soft); }
    .cp-ai-badge { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #2f6bf6, #6f9bff); color: #fff; display: flex; align-items: center; justify-content: center; }
    .cp-ai-badge svg { width: 16px; height: 16px; }
    .cp-side-head .t { font-weight: 700; font-size: 13.5px; }
    .cp-listening { font-size: 11px; color: #1f8a4c; display: flex; align-items: center; gap: 5px; }
    .cp-listening .ld { width: 6px; height: 6px; border-radius: 50%; background: #1f8a4c; animation: pulse 1s ease-in-out infinite; }
    .cp-feed { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 11px; }
    .cp-say { background: var(--blue-soft); color: #274b8e; border-radius: 12px; border-top-left-radius: 3px; padding: 10px 13px; font-size: 12.5px; line-height: 1.5; animation: fadeUp .4s ease both; }
    .cp-say .say-lead { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--blue); display: block; margin-bottom: 3px; }
    .cp-decide { background: #f7faff; border: 1px dashed #cfdef9; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #3a5ba0; line-height: 1.5; animation: fadeUp .4s ease both; }
    .cp-decide b { color: var(--blue); }
    #cpNotes { display: flex; flex-direction: column; gap: 9px; }
    .cp-note-line { display: flex; gap: 8px; font-size: 12px; color: var(--text-muted); align-items: flex-start; animation: fadeUp .35s ease both; }
    .cp-note-line svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; color: #1f8a4c; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .cp-foot { display: flex; align-items: center; gap: 12px; padding: 13px 22px; background: var(--panel); border-top: 1px solid var(--border); }
    .cp-foot .btn-primary, .cp-foot .btn-ghost { width: auto; padding: 9px 22px; }
    .cp-dots { display: flex; gap: 7px; }
    .cp-dot { width: 9px; height: 9px; border-radius: 50%; background: #d7dbe2; }
    .cp-dot.active { background: var(--blue); }
    .cp-dot.done { background: #1f8a4c; }
    @media (max-width: 900px) { .cp-body { grid-template-columns: 1fr; } .cp-side { border-left: none; border-top: 1px solid var(--border); } }

    /* New cockpit layout: center prompter · right points · bottom notes pad */
    .cp-body3 { flex: 1; display: grid; grid-template-columns: 1fr 300px; min-height: 0; }
    .cp-center { overflow: hidden; padding: 14px 22px; }
    .cp-page { margin-top: 12px; }
    .cap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .cp-prompt { border: 1px solid var(--border); border-radius: 14px; background: var(--panel); box-shadow: var(--shadow); overflow: hidden; }
    .cp-prompt-head { display: flex; align-items: center; gap: 9px; padding: 9px 14px; border-bottom: 1px solid var(--border-soft); }
    .cp-prompt-head .t { font-weight: 700; font-size: 13.5px; }
    .cp-hint.empty { display: none; }
    .cp-hint:not(.empty) { background: #efe9fc; color: #4f2e96; padding: 12px 16px; font-size: 12.5px; line-height: 1.5; border-bottom: 1px solid #e0d6f5; animation: fadeUp .35s ease both; }
    .cp-hint .hint-lead { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #6b3fc4; margin-bottom: 4px; }
    .prompt-now { padding: 13px 16px; }
    .prompt-now .pn-lead { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--blue); }
    .prompt-now .pn-text { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; margin: 6px 0 0; }
    .prompt-now .pn-btn { width: auto; padding: 9px 18px; }
    .prompt-now .pn-up { margin-top: 12px; font-size: 12px; color: var(--text-dim); }
    .prompt-now.done .pn-text { color: #1f8a4c; font-size: 15px; }

    .cp-points { border-left: 1px solid var(--border); background: var(--panel); overflow: hidden; }
    .cp-points-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; border-bottom: 1px solid var(--border-soft); font-weight: 700; font-size: 13px; }
    .cp-points-head .pt-count { font-size: 11px; font-weight: 700; color: var(--blue); background: var(--blue-soft); padding: 3px 9px; border-radius: 20px; }
    .pt-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .pt-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 9px; cursor: pointer; background: #fff; }
    .pt-row.got { border-color: #cfe9d6; background: #f3fbf6; }
    .pt-row.miss { border-color: #f3c7c0; background: #fdf1ef; }
    .pt-ck { width: 20px; height: 20px; border-radius: 50%; background: #eef0f3; color: var(--text-muted); font-size: 10.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .pt-ck svg { width: 12px; height: 12px; }
    .pt-row.got .pt-ck { background: #1f8a4c; color: #fff; }
    .pt-row.miss .pt-ck { background: #c0392b; color: #fff; }
    .pt-t { font-size: 12.5px; font-weight: 500; line-height: 1.4; }
    .pt-row.got .pt-t { color: #1f7a45; }

    .cp-pad { background: var(--panel); border-top: 1px solid var(--border); flex-shrink: 0; padding: 9px 22px 11px; }
    .cp-pad-head { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .cp-pad-head svg { width: 14px; height: 14px; color: var(--text-muted); }
    .cp-pad-head .pad-sub { font-weight: 500; color: var(--text-dim); font-size: 11px; }
    .cp-pad-ta { width: 100%; height: 48px; background: #fafbfc; border: 1px solid var(--border); border-radius: 10px; outline: none; resize: none; color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5; padding: 8px 12px; }
    .cp-pad-ta:focus { border-color: var(--blue); background: #fff; }
    .cp-pad-ta::placeholder { color: var(--text-dim); }

    /* Active point flows down; current "say this next" text animates in */
    .pt-row.now { border-color: var(--blue); background: var(--blue-soft); }
    .pt-row.now .pt-ck { background: var(--blue); color: #fff; }
    .pt-row { transition: background .3s, border-color .3s; }
    .pn-text { animation: flowIn .45s ease both; }
    @keyframes flowIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .pn-live { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin-right: 6px; animation: pulse 1s ease-in-out infinite; vertical-align: middle; }
    @media (max-width: 900px) { .cp-body3 { grid-template-columns: 1fr; } .cp-points { border-left: none; border-top: 1px solid var(--border); } }

    /* FSE panel partitions */
    .fse-panel {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
      align-content: start;
    }
    .fse-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }
    .fse-section-head {
      padding: 13px 16px;
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--border-soft);
    }
    .fse-section-body {
      flex: 1;
      padding: 14px;
      min-height: 0;
    }
    /* Two subsections inside Offline */
    .fse-sub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .fse-subsection {
      background: var(--bg);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-height: 150px;
    }
    .fse-sub-head {
      padding: 10px 13px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-soft);
    }
    .fse-sub-body { flex: 1; padding: 12px; }
    .fse-section-body .lead-card,
    .fse-sub-body .lead-card { max-width: 480px; margin-bottom: 14px; }
    .fse-section-body .lead-card:last-child,
    .fse-sub-body .lead-card:last-child { margin-bottom: 0; }
    .fse-hint {
      height: 100%;
      min-height: 90px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 12.5px; text-align: center;
    }

    /* Connect button on the lead card */
    .lc-foot { padding: 12px 14px; border-top: 1px solid var(--border-soft); }
    .btn-primary {
      width: 100%;
      border: none;
      background: var(--blue);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 9px;
      cursor: pointer;
    }
    .btn-primary:hover { filter: brightness(.96); }
    .btn-primary:disabled { background: #b9c6e6; cursor: not-allowed; }
    .btn-ghost {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-weight: 600; font-size: 13px;
      padding: 10px 16px; border-radius: 9px; cursor: pointer;
    }
    .btn-ghost:hover { background: #f4f6f9; }

    /* Connect type capsule + sales-added info header */
    .lc-head .type-capsule {
      margin-left: auto;
      background: var(--blue-soft); color: var(--blue);
      font-weight: 600; font-size: 11px;
      padding: 3px 10px; border-radius: 20px;
    }
    .pcell.conn-head { background: #eef7f0; color: #2f7d4f; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20, 26, 40, 0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
    }
    .modal {
      background: var(--panel);
      width: 100%; max-width: 560px;
      max-height: 88vh;
      border-radius: 14px;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(16, 24, 40, .25);
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border-soft);
      font-size: 15px; font-weight: 700;
    }
    .modal-close {
      border: none; background: transparent; font-size: 24px; line-height: 1;
      color: var(--text-muted); cursor: pointer;
    }
    .modal-body { padding: 18px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 22px; }
    .modal-foot {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 14px 20px; border-top: 1px solid var(--border-soft);
    }
    .modal-foot .btn-primary { width: auto; }

    /* Form */
    .form-section { display: flex; flex-direction: column; gap: 12px; }
    .form-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: var(--blue);
    }
    .form-section-title .opt { color: var(--text-dim); font-weight: 500; text-transform: none; }

    .form-field > label { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .form-input, .form-textarea {
      border: 1px solid var(--border); border-radius: 9px;
      padding: 9px 11px; font-size: 13px; color: var(--text);
      background: #fafbfc; outline: none; font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--blue); background: #fff; }
    .form-textarea { min-height: 70px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .capsules { display: flex; gap: 8px; flex-wrap: wrap; }
    .capsule {
      border: 1px solid var(--border); background: #fff;
      color: var(--text-muted); font-weight: 600; font-size: 12.5px;
      padding: 7px 16px; border-radius: 20px; cursor: pointer;

    .capsule.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    .tag-online {
      background: var(--blue-soft); color: var(--blue); font-weight: 600;
      padding: 3px 10px; border-radius: 20px; font-size: 12px;
    }

    .fse-card .lc-head { cursor: pointer; }

      color: var(--text-muted);
      transition: transform .15s ease;
      margin-left: 2px;
    }
    .fse-card.expanded .lc-chevron { transform: rotate(180deg); }
    .fse-card .fse-card-body { display: none; }
    .fse-card.expanded .fse-card-body { display: block; }

    /* Highlighted FSE call schedule (always visible in the profile block) */
    .fse-sched {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px;
      background: #fff4e5;
      color: #b25e09;
      font-size: 12.5px; font-weight: 600;
    }
    .fse-sched svg { width: 15px; height: 15px; stroke-width: 1.9; flex-shrink: 0; }
    .fse-sched .sched-label { color: #8a5a16; font-weight: 700; }
    .fse-sched .sched-val { margin-left: auto; color: #b25e09; }

    /* AI summary block — bigger, at the end of the info */
    .ai-summary {
      background: var(--blue-soft);
      border-top: 1px solid var(--border-soft);
      padding: 14px 16px 16px;
    }
    .ai-summary-head {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: var(--blue);
      margin-bottom: 9px;
    }
    .ai-summary-head svg { width: 14px; height: 14px; stroke-width: 1.9; }
    .ai-summary-body {
      min-height: 72px;
      font-size: 12.5px; line-height: 1.55;
      color: #7f93c4;
    }

      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .start-assess {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11.5px; font-weight: 600;

    .summary-list {

      align-content: start;
    }

    /* A caller row (collapsible) */
    .person-row {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);

    }

      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .person-avatar.fse { background: #efe9fc; color: #6b3fc4; }
    .person-id { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .person-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .team-badge {
      align-self: flex-start;
      font-size: 10px; font-weight: 700; letter-spacing: .03em;
      padding: 2px 9px; border-radius: 20px; text-transform: uppercase;
    }
    .team-sales { background: var(--blue-soft); color: var(--blue); }
    .team-fse   { background: #efe9fc; color: #6b3fc4; }
    .person-total { margin-left: auto; text-align: right; line-height: 1.05; }
    .person-total .num { font-size: 20px; font-weight: 800; color: var(--text); }
    .person-total .lbl { font-size: 11px; color: var(--text-muted); }
    .person-chevron { width: 16px; height: 16px; color: var(--text-muted); transition: transform .15s ease; flex-shrink: 0; }
    .person-row.expanded .person-chevron { transform: rotate(180deg); }

    .person-body { display: none; border-top: 1px solid var(--border-soft); }
    .person-row.expanded .person-body { display: block; }
    .person-body .ai-summary { border-top: none; }

    .call-list-head {
      padding: 12px 16px 2px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: var(--text-muted);

    .rec-btn {

    ];

    const PHYSIOS = ['Dr. Rohan Gupta', 'Dr. Sneha Iyer', 'Dr. Karan Bhatia', 'Dr. Divya Menon'];
    const FSE_SLOTS = ['Today · 4:00 PM', 'Today · 6:00 PM', 'Tomorrow · 11:00 AM', 'Tomorrow · 3:00 PM', 'Tomorrow · 6:30 PM'];

    const QUALIFY_SUBS = ['High Intent', 'Eligible & Interested', 'Follow-up Scheduled', 'Ready for FSE Trial'];
    const DISQUALIFY_SUBS = ['Not Interested', 'Out of Budget', 'Wrong / Unreachable Number', 'Not Eligible', 'Junk / Duplicate'];

    // Per-lead working state. Lifecycle: new → calling → review → done.
    const leadState = {};
    const ls = (id) => leadState[id] || (leadState[id] = {
      stage: 'new', label: null, intent: 0,
      decision: null, subs: [], physio: null, mode: null, trial: null, slot: null,
      outcome: null, reminder: false,
      callStep: 1, caps: {}, notes: {}, payment: null, captureDone: {},
      assessReady: false, plan: null, addons: [], onbLeft: false, date: '',
      pageLeft: {}, termHint: null
    });

    // When the sales call ends, the AI "fills in" what it heard from the recording.
    function aiFill(d, st) {
      const a = d.ai;
      st.decision = a.decision;
      st.subs = a.subs.slice();
      st.physio = a.physio;
      st.mode = a.mode;
      st.trial = a.trial || null;
    }

    // Follow-up reminders that surface on the Alerts screen.
    const reminders = [];
    function addReminder(d, type, note, when) {
      if (reminders.some(r => r.booking === d.booking && r.type === type)) return;
      reminders.push({ booking: d.booking, name: d.name, type, note, when: when || 'Tomorrow · 11:00 AM' });
    }

    function conversionBlock(conv) {
      const cls = conv.level === 'High' ? 'cv-high' : conv.level === 'Medium' ? 'cv-med' : 'cv-low';
      return `<div class="conv-block"><span class="conv-label">Conversion Chances</span><span class="conv-badge ${cls}">${conv.level} · ${conv.pct}%</span></div>`;
    }

    // AI-recommended routing after the sales call, from the AI flags + chosen call label.
    function recommendRoute(d, st) {
      if (d.ai.langGap) return 'ai-call';          // language gap → AI calls the customer
      if (!d.ai.minInfo) return 'followup';        // min info missing → follow-up (or trash)
      if (st.decision === 'disqualified') return 'disqualify';
      if (st.label === 'Label 2' || st.label === 'Label 3') return 'followup';
      return 'fse';
    }
    function followReason(d, st) {
      if (!d.ai.minInfo) return 'Minimum info not gathered on the sales call — follow-up needed.';
      if (st.label === 'Label 2' || st.label === 'Label 3') return `Call labelled ${st.label} — follow-up scheduled.`;
      return 'Info incomplete / trial not booked — follow-up scheduled.';
    }

    function dcell(label, value, full) {
      return `<div class="pcell${full ? ' full' : ''}"><span class="pc-label">${label}</span><span class="pc-val">${value}</span></div>`;
    }

    function statusPill(st, solo) {
      const s = solo ? ' ml-auto' : '';
      const pill = (cls, txt) => `<span class="status-pill ${cls}${s}"><span class="dot"></span>${txt}</span>`;
      if (st.stage === 'done') {
        const m = {
          converted:    ['moved',    'Converted'],
          fse:          ['moved',    'Moved to FSE'],
          'ai-call':    ['aicall',   'AI Call Scheduled'],
          followup:     ['followup', 'Follow-up Scheduled'],
          trash:        ['trash',    'Trashed'],
          notconverted: ['disq',     'Not Converted'],
          disqualified: ['disq',     'Disqualified']
        };
        const [cls, txt] = m[st.outcome] || m.disqualified;
        return pill(cls, txt);
      }
      const map = { new: ['new', 'New'], calling: ['calling', 'On Call'], review: ['review', 'Review & Confirm'] };
      const [cls, txt] = map[st.stage];
      return pill(cls, txt);
    }

    function intentStars(val, editable) {
      const stars = [1, 2, 3, 4, 5].map(n =>
        `<button type="button" class="istar ${n <= val ? 'on' : ''}" data-act="intent" data-val="${n}" ${editable ? '' : 'disabled'}>★</button>`).join('');
      return `<div class="intent-row"><div class="intent-stars">${stars}</div><span class="intent-label">${val ? val + '/5' : 'Not rated'}</span></div>`;
    }

    function labelCapsules(st, editable) {
      return `<div class="capsules">` +
        ['Label 1', 'Label 2', 'Label 3'].map(l =>
          `<button type="button" class="capsule ${st.label === l ? 'active' : ''}" data-act="label" data-val="${l}" ${editable ? '' : 'disabled'}>${l}</button>`).join('') +
        `</div>`;
    }

    function manualInputs(st, editable) {
      return `
        <div class="card-block">
          <div class="card-block-head">Sales Manual Inputs</div>
          <div class="field-label">Call Type Label</div>
          ${labelCapsules(st, editable)}
          <div class="field-label mt14">Customer Intent — rate out of 5</div>
          ${intentStars(st.intent, editable)}
        </div>`;
    }

    // AI-captured block shown at Review — pre-filled, sales reviews / edits then confirms.
    function decisionBlock(d, st) {
      const subs = st.decision === 'qualified' ? QUALIFY_SUBS : DISQUALIFY_SUBS;
      const subsTitle = st.decision === 'qualified' ? 'Qualification sub-sections' : 'Disqualification reason';
      const qualified = st.decision === 'qualified';
      const physioOpts = [`<option value="" disabled ${st.physio ? '' : 'selected'}>Select physio…</option>`]
        .concat(PHYSIOS.map(p => `<option ${st.physio === p ? 'selected' : ''}>${p}</option>`)).join('');
      return `
        <div class="card-block ai-block">
          <div class="card-block-head">AI Captured — Review &amp; Confirm <span class="ai-tag">AI</span></div>
          <div class="decision-row">
            <button type="button" class="dec-btn qualify ${st.decision === 'qualified' ? 'active' : ''}" data-act="decision" data-val="qualified">Lead Qualification</button>
            <button type="button" class="dec-btn disqualify ${st.decision === 'disqualified' ? 'active' : ''}" data-act="decision" data-val="disqualified">Lead Disqualification</button>
          </div>
          ${st.decision ? `
          <div class="rfield">
            <div class="field-label">${subsTitle} <span class="ai-pill">AI</span></div>
            <div class="capsules">
              ${subs.map(x => `<button type="button" class="capsule ${st.subs.includes(x) ? 'active' : ''}" data-act="sub" data-val="${x}">${x}</button>`).join('')}
            </div>
          </div>` : ''}
          ${qualified ? `
          <div class="rfield">
            <div class="field-label">Mode of Service <span class="ai-pill">AI</span></div>
            <div class="capsules">
              <button type="button" class="capsule ${st.mode === 'online' ? 'active' : ''}" data-act="mode" data-val="online">Online</button>
              <button type="button" class="capsule ${st.mode === 'offline' ? 'active' : ''}" data-act="mode" data-val="offline">Offline</button>
            </div>
            ${st.mode === 'offline' ? `
            <div class="capsules mt10">
              <button type="button" class="capsule ${st.trial === 'online' ? 'active' : ''}" data-act="trial" data-val="online">Online Trial</button>
              <button type="button" class="capsule ${st.trial === 'offline' ? 'active' : ''}" data-act="trial" data-val="offline">Offline Trial</button>
            </div>` : ''}
          </div>
          <div class="rfield">
            <div class="field-label">Assigned Physio (for trial) <span class="ai-pill">AI</span></div>
            <select class="form-input" data-act="physio">${physioOpts}</select>
          </div>` : ''}
          <div class="rfield">
            <div class="field-label">Captured User Intent · First-Call AI Summary <span class="ai-pill">AI</span></div>
            <div class="captured-text">${d.ai.intentSummary}</div>
            ${conversionBlock(d.ai.conversion)}
          </div>
          ${qualified ? `
          <div class="rfield">
            <div class="field-label">Trial Booking <span class="ai-pill">AI</span></div>
            <div class="captured-text">${d.ai.trialBooking}</div>
          </div>` : ''}
        </div>`;
    }

    // Routing shown below the AI-captured block at Review (extra body + footer per route).
    function routeBlock(d, st, route) {
      if (route === 'fse') {
        return `
          <div class="card-block req-block">
            <div class="card-block-head">Book FSE Slot with Physio · required to move</div>
            <select class="form-input" data-act="slot">
              <option value="" disabled ${st.slot ? '' : 'selected'}>Select an FSE slot…</option>
              ${FSE_SLOTS.map(s => `<option ${st.slot === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </div>`;
      }
      if (route === 'ai-call') {
        return `
          <div class="card-block">
            <div class="route-note purple">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg>
              <span>AI flagged a <b>language gap</b> on this call. The AI will call ${d.name.split(' ')[0]} in their language, talk to them, and summarise the call for you.</span>
            </div>
          </div>`;
      }
      if (route === 'followup') {
        const why = followReason(d, st);
        const extra = !d.ai.minInfo ? ' You can schedule a follow-up, or send this lead to trash.' : '';
        return `<div class="card-block"><div class="route-note warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 1.5"/></svg><span>${why}${extra}</span></div></div>`;
      }
      return '';
    }

    function routeFooter(d, st, route) {
      const rem = st.reminder
        ? `<button type="button" class="btn-ghost" disabled>Reminder added ✓</button>`
        : `<button type="button" class="btn-ghost" data-act="add-reminder">Add Reminder</button>`;
      if (route === 'fse') {
        const ok = st.mode && st.physio && st.slot && (st.mode === 'online' || st.trial);
        return `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary" data-act="confirm-move" ${ok ? '' : 'disabled'}>Confirm &amp; Move to FSE</button>${rem}</div></div>`;
      }
      if (route === 'ai-call') {
        return `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary aicall-btn" data-act="route-ai-call">Reschedule for AI Call</button>${rem}</div></div>`;
      }
      if (route === 'followup') {
        const trash = !d.ai.minInfo ? `<button type="button" class="btn-ghost danger-ghost" data-act="route-trash">Send to Trash</button>` : '';
        return `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary" data-act="route-followup">Schedule Follow-up</button>${rem}${trash}</div></div>`;
      }
      return `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary danger" data-act="route-disqualify">Confirm Disqualification</button>${rem}</div></div>`;
    }

    function leadCard(d, withBadge) {
      const st = ls(d.booking);
      const head = `
        <div class="lc-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_PERSON}</svg>
          <span class="lc-title">${d.name}</span>
          ${withBadge ? followBadge(d) : ''}
          ${statusPill(st, !withBadge)}
        </div>`;
      const info = `
        <div class="pgrid">
          ${dcell('Phone Number', d.phone)}
          ${dcell('Lead Source', d.source)}
          ${dcell('Booked Via', d.bookedVia)}
          ${dcell('Campaign ID', d.campaign)}
          ${dcell('Booking ID', d.booking, true)}
        </div>`;

      let body = '', footer = '';
      if (st.stage === 'new') {
        body = `<div class="card-hint pad">Lead created from the booking. Start the sales call to begin — the AI listens during the call and fills the rest.</div>`;
        footer = `<div class="lc-foot"><button type="button" class="btn-primary" data-act="start-call">Start Sales Call</button></div>`;
      } else if (st.stage === 'calling') {
        const ready = st.label && st.intent;
        body = `
          <div class="call-banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg>
            On call — AI is listening and capturing the conversation…
          </div>
          ${manualInputs(st, true)}
          <div class="card-hint pad">End the call and the AI fills the lead decision, physio, mode of service, captured intent &amp; trial booking for you to review.</div>`;
        footer = `<div class="lc-foot"><button type="button" class="btn-primary" data-act="end-call" ${ready ? '' : 'disabled'}>End Call — Let AI Fill</button></div>`;
      } else if (st.stage === 'review') {
        const route = recommendRoute(d, st);
        body = `${manualInputs(st, true)}${decisionBlock(d, st)}${routeBlock(d, st, route)}`;
        footer = routeFooter(d, st, route);
      } else { // done
        const modeTxt = st.mode === 'online' ? 'Online' : 'Offline · ' + (st.trial === 'online' ? 'Online Trial' : 'Offline Trial');
        const conv = `Conversion: <b>${d.ai.conversion.level} ${d.ai.conversion.pct}%</b>`;
        const lbl = `Label: <b>${st.label || '—'}</b>`, intn = `Intent: <b>${st.intent}/5</b>`;
        const planName = st.plan ? PLANS.find(p => p.key === st.plan).name : null;
        let chips, tag;
        if (st.outcome === 'converted') {
          chips = [lbl, intn, `Mode: <b>${modeTxt}</b>`, planName ? `Plan: <b>${planName}</b>` : '', conv].filter(Boolean);
          tag = `<span class="moved-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>Client profile created — Converted</span>`;
        } else if (st.outcome === 'notconverted') {
          chips = [lbl, intn, `Outcome: <b>Declined everything</b>`, conv];
          tag = `<span class="moved-tag disq-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg>Not converted</span>`;
        } else if (st.outcome === 'fse') {
          chips = [lbl, intn, `Mode: <b>${modeTxt}</b>`, `Physio: <b>${st.physio}</b>`, `Slot: <b>${st.date || ''} ${st.slot}</b>`, conv];
          tag = `<span class="moved-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>Confirmed — transferred to FSE panel</span>`;
        } else if (st.outcome === 'ai-call') {
          chips = [lbl, intn, `Flag: <b>Language gap</b>`, conv];
          tag = `<span class="moved-tag aicall-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg>Rescheduled for AI call — see AI Alerts</span>`;
        } else if (st.outcome === 'followup') {
          chips = [lbl, intn, conv];
          tag = `<span class="moved-tag followup-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 1.5"/></svg>Follow-up scheduled — see Alerts</span>`;
        } else if (st.outcome === 'trash') {
          chips = [lbl, intn, `Reason: <b>Min info not gathered</b>`];
          tag = `<span class="moved-tag trash-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Sent to trash</span>`;
        } else { // disqualified
          chips = [lbl, intn, `Reason: <b>${st.subs.join(', ') || '—'}</b>`, conv];
          tag = `<span class="moved-tag disq-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg>Lead disqualified</span>`;
        }
        body = `<div class="done-chips">${chips.map(c => `<span class="done-chip">${c}</span>`).join('')}</div>`;
        footer = st.outcome === 'followup'
          ? `<div class="lc-foot"><div class="foot-row"><button type="button" class="btn-primary" data-act="start-call">Start Follow-up Call</button></div></div>`
          : `<div class="lc-foot">${tag}</div>`;
      }

      return `<div class="lead-card lead-card2" data-id="${d.booking}">${head}${info}${withBadge ? followUpBlock(d) : ''}${body}${footer}</div>`;
    }

    function leadsTab() {
      const fu = LEADS.filter(d => d.followUp);
      return `
        <div class="lead-tab">
          <div class="ai-legend">
            <span class="swatch"></span>
            <span><b>Blue</b> represents AI-assisted info</span>
          </div>
          <div class="leads-scroll">
            <section class="leads-section">
              <div class="leads-section-head">At Least One Follow-Up Call Done <span class="sec-count">${fu.length}</span></div>
              <div class="cards-2col">${fu.map(d => leadCard(d, true)).join('')}</div>
            </section>
            <section class="leads-section">
              <div class="leads-section-head">All Leads <span class="sec-count">${LEADS.length}</span></div>
              <div class="cards-2col">${LEADS.map(d => leadCard(d, false)).join('')}</div>
            </section>
          </div>
        </div>`;
    }

    // FSE card — the full captured lead, shown in the FSE panel once moved.
    function fseCard(d) {
      const st = ls(d.booking);
      const typeText = st.mode === 'online' ? 'Online' : 'Offline · ' + (st.trial === 'online' ? 'Online Trial' : 'Offline Trial');
      return `
        <div class="lead-card fse-card">
          <div class="lc-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_PERSON}</svg>
            <span class="lc-title">${d.name}</span>
            <span class="type-capsule">${typeText}</span>
            <svg class="lc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="fse-sched">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 1.5"/></svg>
            <span class="sched-label">FSE Slot · ${st.physio || 'Physio'}</span>
            <span class="sched-val">${(st.date || '') + ' ' + (st.slot || '—')}</span>
          </div>
          <div class="fse-assess">${startAssess(assessDoc(st))}</div>
          <div class="fse-card-body">
            <div class="pgrid">
              ${dcell('Name', d.name)}
              ${dcell('Phone Number', d.phone)}
              ${dcell('Lead Source', d.source)}
              ${dcell('Booked Via', d.bookedVia)}
              ${dcell('Campaign ID', d.campaign)}
              ${dcell('Booking ID', d.booking, true)}
            </div>
            <div class="pgrid">
              ${dcell('Call Type Label', st.label || '—')}
              ${dcell('Customer Intent', (st.intent || 0) + '/5')}
              ${dcell('Mode of Service', typeText)}
              ${dcell('Assigned Physio', st.physio || '—')}
              ${dcell('Qualification', st.subs.join(', ') || '—', true)}
            </div>
            <div class="ai-summary">
              <div class="ai-summary-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg>AI Summary of Client · First Call</div>
              <div class="ai-summary-body">${d.ai.intentSummary}</div>
              ${conversionBlock(d.ai.conversion)}
            </div>
            <div class="ai-summary">
              <div class="ai-summary-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg>Trial Booking</div>
              <div class="ai-summary-body">${d.ai.trialBooking}</div>
            </div>
          </div>
        </div>`;
    }

    const fseHint = () => `<div class="fse-hint">No leads here yet</div>`;

    // Assessment docs per FSE section type.
    const ASSESS_DOCS = {
      online:       'https://docs.google.com/document/d/1TeBgQNwzpyCAjk00chczFi7L7uQs6eJcoF9kaEZwD0E/edit?tab=t.0',
      onlineTrial:  'https://docs.google.com/document/d/1jXyg72WnAGvLKrLoEcf1BxAlMPeIRMQ87qX4xsT4Ivc/edit?tab=t.0',
      offlineTrial: 'https://docs.google.com/document/d/1XNATDHqLOzV0vkmuMD7wvRZ1zqETrevh7mRHdhJRxaA/edit?tab=t.0'
    };
    const startAssess = (href) =>
      `<a class="start-assess" href="${href}" target="_blank" rel="noopener">` +
      `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>Start Assessment</a>`;

    // The assessment doc that matches this lead's mode / trial type.
    function assessDoc(st) {
      if (st.mode === 'offline') return st.trial === 'online' ? ASSESS_DOCS.onlineTrial : ASSESS_DOCS.offlineTrial;
      return ASSESS_DOCS.online;
    }

    function fseTab() {
      const done = LEADS.filter(d => ls(d.booking).outcome === 'fse');
      const inSec = (fn) => { const a = done.filter(fn); return a.length ? a.map(fseCard).join('') : fseHint(); };
      return `
        <div class="fse-panel">
          <section class="fse-section">
            <div class="fse-section-head">Online</div>
            <div class="fse-section-body">${inSec(d => ls(d.booking).mode === 'online')}</div>
          </section>
          <section class="fse-section">
            <div class="fse-section-head">Offline</div>
            <div class="fse-section-body fse-sub-grid">
              <div class="fse-subsection">
                <div class="fse-sub-head">Online Trial</div>
                <div class="fse-sub-body">${inSec(d => { const s = ls(d.booking); return s.mode === 'offline' && s.trial === 'online'; })}</div>
              </div>
              <div class="fse-subsection">
                <div class="fse-sub-head">Offline Trial</div>
                <div class="fse-sub-body">${inSec(d => { const s = ls(d.booking); return s.mode === 'offline' && s.trial === 'offline'; })}</div>
              </div>
            </div>
          </section>
        </div>`;
    }

    const ICON_SPARK = '<path d="M12 2l2.4 5.6L20 10l-5.6 2.4L12 18l-2.4-5.6L4 10l5.6-2.4z"/>';

    // Past lead card — same profile, plus sales+FSE call history, both AI summaries, report link.
    function pastCard(status) {
      const conn = [{ label: 'Connected Info (added by sales)', full: true, head: true, cls: 'conn-head' }]
        .concat(CONNECTED_FIELDS.map(l => ({ label: l })));
      const hist = [
        { label: 'Call History', full: true, head: true },
        { label: 'Sales Team Calls' },
        { label: 'FSE Calls' }
      ];
      const badge = status === 'Converted' ? 'badge-converted' : 'badge-notconv';
      const summary = (title, text) => `
        <div class="ai-summary">
          <div class="ai-summary-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_SPARK}</svg>${title}</div>
          <div class="ai-summary-body">${text}</div>
        </div>`;
      return `
        <div class="lead-card fse-card">
          <div class="lc-head">
